<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATTRACK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#cc0000;--mid:#888;--fg:#000;--bg:#fff;--bg2:#f5f5f5;--border:#000;--border-l:#e0e0e0;--border-m:#e8e8e8;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fff;color:#000;font-size:18px;line-height:1.5;}

/* ── NAV WRAPPER ─────────────────────────────────────────────────── */
/* transparent so only letter slivers show when items translate up   */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;background:transparent;}

/* ── NAV TOPBAR (user info) ──────────────────────────────────────── */
#nav-topbar{display:flex;align-items:center;justify-content:flex-end;padding:7px 40px;gap:12px;font-size:18px;border-bottom:1px solid #e0e0e0;background:#fff;}

/* ── PRIMARY NAV ─────────────────────────────────────────────────── */
/* overflow:hidden clips items as they translate up (OMA mechanic)   */
#nav-primary{display:flex;justify-content:space-between;align-items:flex-end;padding:10px 40px 0;overflow:hidden;}
.nav-main{font-size:clamp(40px,8vw,220px);font-weight:900;letter-spacing:-0.03em;line-height:1;padding-bottom:10px;cursor:pointer;color:#000;text-transform:uppercase;user-select:none;will-change:transform;transition:opacity .15s;}
.nav-main:hover{opacity:.45;}
.nav-main.outline{-webkit-text-stroke:2px #000;color:transparent;}

/* ── SUB NAV ─────────────────────────────────────────────────────── */
#nav-sub{display:flex;align-items:baseline;padding:4px 40px 0;gap:0;}
.nav-sub-item{font-size:clamp(24px,3vw,46px);font-weight:900;letter-spacing:-.5px;text-transform:uppercase;cursor:pointer;color:#000;border-bottom:3px solid transparent;padding-bottom:4px;margin-right:52px;user-select:none;transition:opacity .15s;}
.nav-sub-item:last-child{margin-right:0;}
.nav-sub-item:hover{opacity:.45;}
.nav-sub-item.active{border-bottom:3px solid #000;}
.nav-divider{border:none;border-top:2px solid #000;margin:0;}

/* ── ROLE & STATUS TAGS ──────────────────────────────────────────── */
.role-tag{font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid #000;}
.role-tag.crafter{border-color:var(--red);color:var(--red);}
.role-tag.admin{background:#000;color:#fff;}
.role-tag.crafter_pending{border-color:#f59e0b;color:#f59e0b;}
.role-tag.provider{border-color:#bbb;color:#999;}
.role-tag.logistics{border-color:#0ea5e9;color:#0ea5e9;}
.role-tag.logistics_pending{border-color:#0ea5e9;color:#0ea5e9;opacity:.6;}
.role-tag.removed{border-color:#fca5a5;color:#ef4444;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-dot{animation:pulse 2s infinite;}

/* ── PAGE LAYOUT ─────────────────────────────────────────────────── */
.page{padding:60px 40px 140px;}
.page-title{font-size:38px;font-weight:900;letter-spacing:-.5px;line-height:1;margin-bottom:10px;}
.page-sub{font-size:18px;color:#000;margin-bottom:52px;margin-top:4px;}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:60px;padding-bottom:0;}
.page-head-left{flex:1;}
hr.thick{border:none;border-top:2px solid #000;margin:60px 0;}
hr.thin{border:none;border-top:1px solid #e0e0e0;margin:0;}
hr.red{border:none;border-top:1px solid var(--red);margin:60px 0;}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:18px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:9px 18px;}
.btn-black{background:#000;color:#fff;}
.btn-black:hover{background:#222;}
.btn-outline{background:#fff;color:#000;border:1.5px solid #000;}
.btn-outline:hover{background:#f0f0f0;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:#a00;}
.btn-sm{padding:5px 11px;font-size:18px;}
.btn-ghost{background:none;color:#000;border:1px solid #ccc;padding:5px 11px;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.btn-ghost:hover{border-color:#000;color:#000;}
.btn-ghost.active{background:#000;color:#fff;border-color:#000;}
.btn-max{background:#000;color:#fff;padding:0 16px;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1.5px solid #000;white-space:nowrap;}
.btn-max:hover{background:#333;}

/* ── FORMS ───────────────────────────────────────────────────────── */
label.lbl{display:block;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;color:#000;}
input[type=text],input[type=password],input[type=number],select{
  display:block;width:100%;border:1.5px solid #000;padding:9px 12px;font-size:18px;font-family:inherit;background:#fff;appearance:none;-webkit-appearance:none;outline:none;}
input:focus,select:focus{border-color:var(--red);}
input::placeholder{color:#000;}
.field{margin-bottom:28px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:32px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
.panel{border:1.5px solid #000;padding:40px;}
.collapsible{display:none;}
.collapsible.open{display:block;}

/* ── TABLES ──────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;}
thead th{font-size:18px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:16px 14px;border-bottom:2px solid #000;text-align:left;white-space:nowrap;color:#000;}
tbody td{padding:20px 14px;vertical-align:middle;font-size:18px;}
tbody tr:hover{background:#f9f9f9;}
.empty{padding:120px 0;text-align:center;color:#000;font-size:18px;letter-spacing:.04em;}

/* ── TAGS ────────────────────────────────────────────────────────── */
.q{display:inline-block;padding:2px 7px;font-size:18px;font-weight:700;background:#000;color:#fff;}
.unit-tag{display:inline-block;padding:1px 5px;font-size:18px;font-weight:700;letter-spacing:.06em;color:#000;margin-left:4px;}
.cat-tag{display:inline-block;padding:1px 5px;font-size:18px;font-weight:700;letter-spacing:.06em;background:#f0f0f0;color:#000;}
.item-cat-tag{display:inline-block;padding:2px 8px;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#000;color:#fff;}
.craft-box{border:2px solid #000;padding:36px;margin-bottom:48px;}
.craft-box.err{border-color:var(--red);}
.q-big{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;}

/* ── LOG BADGES ──────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:0;background:none;color:#000;}
.badge-crafted,.badge-material_added,.badge-material_removed,.badge-item_created,
.badge-item_deleted,.badge-material_moved,.badge-user_joined,.badge-member_removed,
.badge-task_created,.badge-task_accepted,.badge-task_completed,.badge-crafter_approved,
.badge-role_approved,.badge-crafter_denied,.badge-role_denied,.badge-admin_granted,
.badge-item_handed_out{background:none;color:#000;}

/* ── INVENTORY ───────────────────────────────────────────────────── */
.inv-quality{font-size:32px;font-weight:900;letter-spacing:-1px;line-height:1;}
.inv-row{padding:32px 0;}


/* ── TASKS ───────────────────────────────────────────────────────── */
.task-list{border-top:2px solid #000;}
.task-card{padding:32px 0;margin-bottom:0;position:relative;padding-left:20px;}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.task-card.urgent::before{background:var(--red);}
.task-card.high::before{background:#f97316;}
.task-card.normal::before{background:#3b82f6;}
.task-card.whenever::before{background:#d1d5db;}
.task-card:hover{background:#fafafa;}
.task-card.completed{opacity:.5;}
.task-card.cancelled{opacity:.35;}
.task-card-title{font-size:24px;font-weight:900;letter-spacing:-.3px;line-height:1.2;margin-bottom:12px;}
.p-badge{display:inline-block;padding:2px 7px;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-right:6px;}
.p-urgent{background:var(--red);color:#fff;}
.p-high{background:#f97316;color:#fff;}
.p-normal{background:#3b82f6;color:#fff;}
.p-whenever{background:#e5e7eb;color:#555;}
.role-badge{display:inline-block;padding:1px 6px;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid #000;margin-right:3px;}
.rb-provider{border-color:#bbb;color:#888;}
.rb-crafter{border-color:var(--red);color:var(--red);}
.rb-logistics{border-color:#0ea5e9;color:#0ea5e9;}
.rb-admin{background:#000;color:#fff;}
.task-search-bar{padding:0 0 36px;margin-bottom:0;}

/* ── MISC CONTROLS ───────────────────────────────────────────────── */
.btn-del{background:none;border:1px solid #fca5a5;color:var(--red);padding:4px 10px;font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.btn-del:hover{background:var(--red);color:#fff;border-color:var(--red);}
.pending-note{background:#fffbeb;padding:10px 14px;font-size:18px;color:#000;margin-top:10px;line-height:1.6;display:none;}

/* ── AUTH ────────────────────────────────────────────────────────── */
.center-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;}
.auth-box{width:100%;max-width:400px;}
.auth-logo{font-size:clamp(44px,8vw,100px);font-weight:900;letter-spacing:-4px;text-align:center;margin-bottom:72px;}
.tabs{display:flex;border-bottom:2px solid #000;margin-bottom:40px;}
.tab-btn{flex:1;padding:12px;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-align:center;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;color:#000;}
.tab-btn.active{border-bottom-color:#000;color:#000;}
.err-msg{font-size:18px;color:var(--red);margin-bottom:12px;display:none;}
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;}
.chk-row input{width:auto;flex-shrink:0;}
.chk-row span{font-size:18px;}
.setup-note{font-size:18px;color:#000;margin-top:16px;line-height:1.7;}
.code-block{background:#f5f5f5;padding:8px 12px;font-family:monospace;font-size:18px;margin:8px 0;}

/* ── TOAST / MODAL ───────────────────────────────────────────────── */
#toast{position:fixed;bottom:28px;right:28px;background:#000;color:#fff;padding:12px 20px;font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:none;z-index:999;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:24px;}
#modal-overlay.open{display:flex;}
.modal-box{background:#fff;padding:36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:40px;}
.search-row{display:flex;gap:12px;align-items:center;margin-bottom:36px;}
.search-row input{max-width:260px;margin:0;}

/* ── INLINE UTILS ────────────────────────────────────────────────── */
.unit-inline{font-size:18px;font-weight:700;color:#000;margin-left:4px;}
.loc-display{font-size:18px;color:#000;}
.sys-badge{font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:#333;padding:1px 5px;margin-right:4px;}
.sys-badge.pyro{background:var(--red);}
.sys-badge.nyx{background:#005080;}

/* ── FILTER TABS (inline content) ────────────────────────────────── */
.filter-tabs{display:flex;gap:48px;flex-wrap:wrap;margin-bottom:52px;padding-bottom:20px;}
.filter-tab{padding:0;font-size:18px;font-weight:700;border:none;background:none;color:#000;cursor:pointer;letter-spacing:-.1px;}
.filter-tab.active{color:#000;border-bottom:2px solid #000;padding-bottom:2px;}
.filter-tab:hover:not(.active){color:#000;}

/* ── PAGE SUB-TABS (now in nav — keep for compat, invisible) ─────── */
.sub-tabs{display:none;}
.sub-tab{display:none;}

/* ── HINT BOX ────────────────────────────────────────────────────── */
.hint-box{background:#f5f5f5;border-left:3px solid #000;padding:16px 20px;font-size:18px;color:#000;margin-top:16px;line-height:1.8;}
.hint-box strong{color:#000;}

/* ── OVERVIEW / LANDING ──────────────────────────────────────────── */
.ov-wrap{}
.ov-header{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:28px;border-bottom:2px solid #000;}
.ov-title{display:none;}
.ov-greeting{font-size:clamp(22px,3vw,34px);font-weight:900;letter-spacing:-.5px;line-height:1;}
.ov-greeting-sub{font-size:18px;color:#000;margin-top:6px;font-weight:400;}
.ov-date{font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#000;text-align:right;line-height:1.9;}
.ov-stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid #000;}
.ov-stat{padding:40px 0;}
.ov-stat-num{font-size:clamp(42px,6vw,66px);font-weight:900;letter-spacing:-3px;line-height:1;margin-bottom:10px;}
.ov-stat-num.red{color:var(--red);}
.ov-stat-label{font-size:18px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#000;}
.ov-stat-sub{font-size:18px;color:#000;margin-top:5px;letter-spacing:.04em;}
.ov-body{display:grid;grid-template-columns:3fr 2fr;gap:0;border-bottom:2px solid #000;}
.ov-col{padding:40px 0;}
.ov-col+.ov-col{padding-left:60px;}
.ov-col-head{font-size:38px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid #000;}
.ov-entry{display:grid;grid-template-columns:60px 100px 1fr auto;gap:8px 28px;padding:14px 0;align-items:baseline;}
.ov-entry-date{font-size:18px;color:#000;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.ov-entry-action{font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#000;white-space:nowrap;}
.ov-entry-body{font-size:18px;line-height:1.6;}
.ov-entry-who{font-size:18px;color:#000;font-weight:700;letter-spacing:.04em;white-space:nowrap;}
.ov-task-row{padding:16px 0;}
.ov-task-title{font-size:18px;font-weight:600;margin-bottom:5px;}
.ov-task-meta{font-size:18px;color:#000;}
.ov-bottom{display:grid;grid-template-columns:3fr 2fr;gap:0;padding-top:32px;}
.ov-empty{color:#000;font-size:18px;padding:24px 0;}

/* ── DARK MODE ───────────────────────────────────────────────────── */
body.dark{background:#111;color:#e0e0e0;--fg:#e0e0e0;--bg:#111;--bg2:#1a1a1a;--border:#e0e0e0;--border-l:#333;--border-m:#2a2a2a;}
body.dark #nav-topbar{background:#111;border-bottom-color:#333;}
body.dark .nav-main{color:#e0e0e0;}
body.dark .nav-main.outline{-webkit-text-stroke:2px #e0e0e0;color:transparent;}
body.dark .nav-sub-item{color:#e0e0e0;}
body.dark .nav-sub-item.active{border-bottom-color:#e0e0e0;}
body.dark .nav-divider{border-top-color:#e0e0e0;}
body.dark hr.thick{border-top-color:#e0e0e0;}
body.dark hr.thin{border-top-color:#333;}
body.dark hr.red{border-top-color:var(--red);}
body.dark .page-sub{color:#e0e0e0;}
body.dark input[type=text],body.dark input[type=password],body.dark input[type=number],body.dark select{background:#1a1a1a;border-color:#e0e0e0;color:#e0e0e0;}
body.dark input::placeholder{color:#888;}
body.dark .panel{border-color:#e0e0e0;}
body.dark .btn-black{background:#e0e0e0;color:#111;}
body.dark .btn-black:hover{background:#ccc;}
body.dark .btn-outline{background:#111;color:#e0e0e0;border-color:#e0e0e0;}
body.dark .btn-outline:hover{background:#222;}
body.dark .btn-ghost{background:none;color:#e0e0e0;border-color:#555;}
body.dark .btn-ghost:hover{border-color:#e0e0e0;color:#e0e0e0;}
body.dark .btn-ghost.active{background:#e0e0e0;color:#111;border-color:#e0e0e0;}
body.dark .btn-max{background:#e0e0e0;color:#111;border-color:#e0e0e0;}
body.dark .btn-max:hover{background:#ccc;}
body.dark .btn-del{border-color:#7f1d1d;color:var(--red);}
body.dark .btn-del:hover{background:var(--red);color:#fff;}
body.dark label.lbl{color:#e0e0e0;}
body.dark thead th{border-bottom-color:#e0e0e0;color:#e0e0e0;}
body.dark tbody tr:hover{background:#1a1a1a;}
body.dark .empty{color:#e0e0e0;}
body.dark .q{background:#e0e0e0;color:#111;}
body.dark .cat-tag{background:#222;color:#e0e0e0;}
body.dark .item-cat-tag{background:#e0e0e0;color:#111;}
body.dark .craft-box{border-color:#e0e0e0;}
body.dark .task-list{border-top-color:#e0e0e0;}
body.dark .task-card:hover{background:#1a1a1a;}
body.dark .task-card.whenever::before{background:#444;}
body.dark .p-whenever{background:#333;color:#aaa;}
body.dark .role-badge{border-color:#e0e0e0;}
body.dark .rb-admin{background:#e0e0e0;color:#111;}
body.dark .role-tag{border-color:#e0e0e0;color:#e0e0e0;}
body.dark .role-tag.admin{background:#e0e0e0;color:#111;}
body.dark .badge{color:#e0e0e0;}
body.dark .badge-crafted,.dark .badge-material_added,.dark .badge-material_removed,.dark .badge-item_created,.dark .badge-item_deleted,.dark .badge-material_moved,.dark .badge-user_joined,.dark .badge-member_removed,.dark .badge-task_created,.dark .badge-task_accepted,.dark .badge-task_completed,.dark .badge-crafter_approved,.dark .badge-role_approved,.dark .badge-crafter_denied,.dark .badge-role_denied,.dark .badge-admin_granted,.dark .badge-item_handed_out{color:#e0e0e0;}
body.dark .ov-col-head{border-bottom-color:#333;}
body.dark .ov-header{border-bottom-color:#333;}
body.dark .ov-stats{border-bottom-color:#333;}
body.dark .ov-body{border-bottom-color:#333;}
body.dark .ov-col+.ov-col{}
body.dark .modal-box{background:#111;}
body.dark #toast{background:#e0e0e0;color:#111;}
body.dark .tabs{border-bottom-color:#e0e0e0;}
body.dark .tab-btn{color:#e0e0e0;}
body.dark .tab-btn.active{border-bottom-color:#e0e0e0;color:#e0e0e0;}
body.dark .filter-tab{color:#e0e0e0;}
body.dark .filter-tab.active{border-bottom-color:#e0e0e0;color:#e0e0e0;}
body.dark .hint-box{background:#1a1a1a;border-left-color:#e0e0e0;}
body.dark .code-block{background:#1a1a1a;}
body.dark .pending-note{background:#1a1a12;color:#e0e0e0;}
body.dark .sys-badge{background:#444;color:#e0e0e0;}
body.dark .sys-badge.pyro{background:var(--red);}
body.dark .sys-badge.nyx{background:#004a6e;}
body.dark .log-month-arrow{color:#e0e0e0;}
body.dark details.log-month>summary{border-bottom-color:#333;}
body.dark .unit-tag{color:#e0e0e0;}
body.dark .loc-display{color:#e0e0e0;}
body.dark .ov-date{color:#e0e0e0;}
body.dark .ov-stat-label{color:#e0e0e0;}
body.dark .ov-task-meta{color:#e0e0e0;}
body.dark .ov-empty{color:#e0e0e0;}
body.dark .ov-entry-date{color:#e0e0e0;}
body.dark .ov-entry-who{color:#e0e0e0;}
body.dark .ov-greeting-sub{color:#e0e0e0;}

/* ── LOTTERY ─────────────────────────────────────────────────────── */
.lottery-card{border:1.5px solid var(--border);padding:28px;margin-bottom:20px;position:relative;}
.lottery-status{display:inline-block;padding:2px 8px;font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-left:12px;}
.lottery-status.draft{background:#f0f0f0;color:#555;}
.lottery-status.open{background:#22c55e;color:#fff;}
.lottery-status.drawn{background:#f59e0b;color:#fff;}
.lottery-status.closed{background:#555;color:#fff;}
body.dark .lottery-status.draft{background:#2a2a2a;color:#aaa;}
.pkg-card{border:1.5px solid var(--border-l);padding:20px;margin-bottom:12px;}
.pkg-card.picked{border-color:#22c55e;opacity:.8;}
.pkg-card.mine{border-color:#22c55e;background:#f0fdf4;}
body.dark .pkg-card.mine{background:#052e16;}
.pkg-item-row{display:flex;align-items:baseline;gap:10px;padding:5px 0;border-bottom:1px solid var(--border-m);}
.pkg-item-row:last-child{border-bottom:none;}
.comp-type-badge{display:inline-block;padding:1px 6px;font-size:18px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#000;color:#fff;}
body.dark .comp-type-badge{background:#e0e0e0;color:#111;}
.comp-grade-mil{color:#cc0000;}
.comp-grade-sth{color:#7c3aed;}
.comp-grade-cmp{color:#0ea5e9;}
.comp-grade-civ{color:var(--fg);}
.comp-grade-ind{color:#888;}
.tier-a{font-weight:900;color:#eab308;}
.tier-b{font-weight:700;color:var(--fg);}
.tier-c{color:#888;}
.tier-d{color:#aaa;}

/* ── ARCHIVE MONTH GROUPS ────────────────────────────────────────── */
details.log-month{}
details.log-month>summary{display:flex;align-items:center;gap:14px;padding:28px 0;cursor:pointer;user-select:none;list-style:none;}
details.log-month>summary::-webkit-details-marker{display:none;}
details.log-month>summary::marker{display:none;}
.log-month-arrow{font-size:9px;color:#000;transition:transform .15s;display:inline-block;flex-shrink:0;}
details.log-month[open] .log-month-arrow{transform:rotate(90deg);}
.log-month-name{font-size:24px;font-weight:900;letter-spacing:-.3px;}
.log-month-count{font-size:18px;color:#000;margin-left:auto;font-weight:700;letter-spacing:.06em;}
details.log-month>div{padding-bottom:48px;}

const COMP_TYPE_MAP = {
  COOL:'Cooler', POWR:'Power Plant', QDRV:'Quantum Drive', QRDV:'Quantum Drive',
  QDMP:'Quantum Dampener', LIFE:'Life Support', COMP:'Computer',
  SHLD:'Shield', RADR:'Radar', JUMP:'Jump Drive', SECO:'Ship Computer', QED:'QED'
};
const COMP_GRADE_MAP = {
  Mil:'Military', Civ:'Civilian', Ind:'Industrial', Cmp:'Competition', Sth:'Stealth'
};

const LOTTERY_TYPES = ['COOL','POWR','QDRV','SHLD'];

function parseComponentsCatalog() {
  const TYPE_MAP = { cooler:'COOL', power:'POWR', quantum:'QDRV', shield:'SHLD' };
  const seen = new Set();
  const out = [];
  for (const c of COMPONENTS_JSON) {
    const type = TYPE_MAP[c.category];
    if (!type) continue;
    if (!LOTTERY_TYPES.includes(type)) continue;
    if (c.size < 0 || c.size > 3) continue;
    if (!['A','B','C'].includes(c.grade)) continue;
    const dk = `${type}|${c.name}|${c.field}|${c.size}|${c.grade}`;
    if (seen.has(dk)) continue;
    seen.add(dk);
    out.push({ name: c.name, type, typeName: COMP_TYPE_MAP[type]||type, grade: c.field, gradeName: COMP_GRADE_MAP[c.field]||c.field, size: c.size, tier: c.grade });
  }
  return out.sort((a,b) => {
    if(a.typeName!==b.typeName) return a.typeName.localeCompare(b.typeName);
    if(a.size!==b.size) return a.size-b.size;
    if(a.tier!==b.tier) return a.tier.localeCompare(b.tier);
    return a.name.localeCompare(b.name);
  });
}
const COMPONENTS_CATALOG = parseComponentsCatalog();

// Value = base(type) + size + tier + class multipliers
function compDefaultValue(comp) {
  const base      = {COOL:10, POWR:15, QDRV:18, SHLD:15}[comp.type] || 10;
  const sizeMult  = {0:8, 1:10, 2:15, 3:20}[comp.size] ?? 8;
  const tierMult  = {A:25, B:15, C:10}[comp.tier] || 10;
  const classMult = {Mil:20, Sth:15, Civ:10, Ind:10, Cmp:10}[comp.grade] || 10;
  return base + sizeMult + tierMult + classMult;
}

async function convexQuery(path, args = {}) {
  const r = await fetch(`${CONVEX_URL}/api/query`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path, args, format:'json' }),
  });
  const d = await r.json();
  if (d.status !== 'success') throw new Error(d.errorMessage || 'Query failed');
  return d.value;
}
function handleSessionError(e) {
  if(e.message&&(e.message.includes('SESSION_INVALID')||e.message.includes('SESSION_EXPIRED'))) {
    state.user=null; state.sessionToken=null;
    localStorage.removeItem('navytrack_token');
    showAuth(); toast('Session expired — please sign in again');
    return true;
  }
  return false;
}

async function convexMutation(path, args = {}) {
  const r = await fetch(`${CONVEX_URL}/api/mutation`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path, args, format:'json' }),
  });
  const d = await r.json();
  if (d.status !== 'success') throw new Error(d.errorMessage || 'Mutation failed');
  return d.value;
}

async function hashPwd(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'|navytrack_v1'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = d => new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtDT   = d => new Date(d).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
function toast(msg, dur=2800) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',dur);

async function refreshAll(silent=false) {
  try {
    const [stock, items, archive, allUsers, inventory, tasks, lotteries] = await Promise.all([
      convexQuery('materials:getAvailable'),
      convexQuery('craftItems:getAll'),
      convexQuery('archive:getAll'),
      convexQuery('users:getAllUsers'),
      convexQuery('inventory:getAll'),
      convexQuery('tasks:getAll'),
      convexQuery('lotteries:getAll'),
    ]);
    state.stock      = stock     || [];
    state.craftItems = items     || [];
    state.archive    = archive   || [];
    state.allUsers   = allUsers  || [];
    state.inventory  = inventory || [];
    state.tasks      = tasks     || [];
    state.lotteries  = lotteries || [];
    // Sync logged-in user's roles from server
    if(state.user) {
      const fresh=state.allUsers.find(u=>u._id===state.user._id);
      if(fresh) state.user=fresh;
    }
    updateLiveView();
  } catch(e) { if(!silent) console.warn('Refresh:', e.message); }
}
function startPolling() { refreshAll(); pollTimer=setInterval(()=>refreshAll(true),5000); }

    const el=document.getElementById('admin-wrap'); if(el) el.innerHTML=renderAdminContent();
  }
  if (currentPage==='tasks') {
    const el=document.getElementById('tasks-list'); if(el) el.innerHTML=renderTasksList();
    renderNav(); // keep sub-nav counts updated
  }
  if (currentPage==='lottery') {
    // Don't blast the DOM if user is typing
    const active = document.activeElement;
    const typing = active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA') && document.getElementById('page-wrap')?.contains(active);

async function doSignIn() {
  const username=(document.getElementById('si-user')||{value:''}).value.trim();
  const password=(document.getElementById('si-pass')||{value:''}).value;
  if(!username||!password){showErr('si-err','Fill in all fields');return;}
  try {

    if(!res){showErr('si-err','Invalid username or password');return;}
    state.user=res; state.sessionToken=res.token;

}

function updateMatQtyUnit(cat) {
  const u=cat==='Gems'?'UNIT':'SCU';
  const lbl=document.getElementById('mat-qty-lbl'); if(lbl) lbl.textContent=`Quantity (${u})`;
  const hint=document.getElementById('mat-qty-hint');
  if(hint) hint.textContent=u==='SCU'?'0.01 SCU increments':'Whole amounts only (1 unit minimum)';

function onSystemChange() {

}

function filterMaterials() {
  const q=(document.getElementById('mat-search')||{value:''}).value.toLowerCase();
  const mine=(document.getElementById('mat-mine')||{checked:false}).checked;
  const typeF=(document.getElementById('mat-type-filter')||{value:'all'}).value;
  let stock=state.stock.filter(m=>m.status==='available');
  if(mine) stock=stock.filter(m=>m.ownerId===state.user._id);
  if(typeF!=='all') stock=stock.filter(m=>m.category===typeF);
  if(q) stock=stock.filter(m=>
    m.materialName.toLowerCase().includes(q)||
    m.location.toLowerCase().includes(q)||
    m.system.toLowerCase().includes(q)||
    m.ownerName.toLowerCase().includes(q)||
    m.category.toLowerCase().includes(q));
  const el=document.getElementById('mat-table');
  if(el) el.innerHTML=renderMatTable(stock);
}

async function addMaterial() {
  const u=state.user;
  const category=(document.getElementById('mat-cat-sel')||{value:'Ores'}).value;
  let name=(document.getElementById('mat-name-sel')||{value:''}).value;
  let unit=category==='Gems'?'UNIT':'SCU';
  if (name==='__new__') {
    name=(document.getElementById('mat-new-name')||{value:''}).value.trim();
    if(!name){alert('Enter material name');return;}
  } else if (!name) {
    alert('Select a material'); return;
  } else {
    const entry=catLookup(name);
    if(entry){ unit=entry.unit; }
  }
  const qual=parseInt((document.getElementById('mat-quality')||{value:''}).value);
  const qty=parseFloat((document.getElementById('mat-qty')||{value:''}).value);
  const system=(document.getElementById('mat-system')||{value:''}).value;
  const location=(document.getElementById('mat-location')||{value:''}).value;
  if(!name||isNaN(qual)||isNaN(qty)||!system||!location){alert('Fill in all fields');return;}
  if(qual<0||qual>1000){alert('Quality must be 0–1000');return;}
  if(qty<=0){alert('Quantity must be greater than 0');return;}
  try {
    if(!SC_CATALOG.find(m=>m.name===name))
      await convexMutation('materials:addToCatalog',{name,category,unit});
    await convexMutation('materials:add',{sessionToken:state.sessionToken,materialName:name,category,unit,quality:qual,quantity:qty,system,location});
    toast('Material added');
    togglePanel('add-mat-panel');
    await refreshAll();
  } catch(e){alert(e.message);}
}

async function removeMaterial(id) {
  if(!confirm('Remove this material from stock?')) return;
  try {
    await convexMutation('materials:remove',{id,sessionToken:state.sessionToken});
    toast('Removed');
    await refreshAll();
  } catch(e){alert(e.message);}
}

function recomputePlan() {
  if(!craftState.itemId) return;

    craftState.qMin=parseInt((document.getElementById('q-min')||{value:'0'}).value)||0;

  }

// Calculate max complete crafts available with current quality filter
function calcMaxCrafts(item, stock, mode, qMin, qMax) {
  if(!item.requirements.length) return 0;
  let maxCrafts = Infinity;
  for(const req of item.requirements){
    let pool=stock.filter(m=>m.materialName===req.materialName&&m.status==='available');
    if(mode==='range') {
      pool=pool.filter(m=>m.quality>=qMin&&m.quality<=qMax);
    } else {
      // best mode: within 50 of the best in this pool
      const best=pool.length>0?Math.max(...pool.map(m=>m.quality)):0;
      pool=pool.filter(m=>m.quality>=best-50);
    }
    const totalAvail=pool.reduce((s,m)=>s+m.quantity,0);
    if(req.quantity>0) maxCrafts=Math.min(maxCrafts, Math.floor(totalAvail/req.quantity));
    else maxCrafts=0;
  }
  return maxCrafts===Infinity?0:Math.max(0,maxCrafts);
}

function setMaxCrafts() {
  if(!craftState.itemId){ toast('Select an item first.'); return; }
  const item=state.craftItems.find(i=>i._id===craftState.itemId); if(!item) return;
  if(craftState.mode==='range'){
    craftState.qMin=parseInt((document.getElementById('q-min')||{value:'0'}).value)||0;
    craftState.qMax=parseInt((document.getElementById('q-max')||{value:'1000'}).value)||1000;
  }
  const max=calcMaxCrafts(item,state.stock,craftState.mode,craftState.qMin,craftState.qMax);
  if(max<=0){ toast('Not enough materials for even 1 craft with current quality settings.'); return; }
  const el=document.getElementById('craft-qty');
  if(el) el.value=max;
  craftState.quantity=max;
  recomputePlan();
}

function calcPlan(item, stock, mode, qMin, qMax, quantity=1) {
  const plan={item,quantity,canCraft:true,requirements:[],avgQuality:0,_qSum:0,_qUsed:0};
  for(const req of item.requirements){
    const totalNeeded=req.quantity*quantity;
    let pool=stock.filter(m=>m.materialName===req.materialName&&m.status==='available');
    if(mode==='range') {
      pool=pool.filter(m=>m.quality>=qMin&&m.quality<=qMax);
    } else {
      // best mode: within 50 of the best in this pool
      const best=pool.length>0?Math.max(...pool.map(m=>m.quality)):0;
      pool=pool.filter(m=>m.quality>=best-50);
    }
    pool.sort((a,b)=>b.quality-a.quality);
    let needed=totalNeeded;
    const batches=[];
    let qSum=0;
    for(const b of pool){
      if(needed<=0) break;
      const use=Math.min(needed,b.quantity);
      batches.push({stockId:b._id,materialName:b.materialName,unit:b.unit,quality:b.quality,quantityUse:use,quantityAvail:b.quantity,system:b.system,location:b.location,ownerName:b.ownerName,ownerId:b.ownerId});
      qSum+=b.quality*use; needed-=use;
    }
    const fulfilled=totalNeeded-needed;
    const avgQ=fulfilled>0?Math.round(qSum/fulfilled):0;
    plan.requirements.push({materialName:req.materialName,unit:req.unit,needed:totalNeeded,fulfilled,shortfall:needed,batches,avgQuality:avgQ,ok:needed<=0.0001});
    if(needed>0.0001) plan.canCraft=false;
    plan._qSum+=qSum; plan._qUsed+=fulfilled;
  }
  plan.avgQuality=plan._qUsed>0?Math.round(plan._qSum/plan._qUsed):0;
  return plan;
}

const LOTTERY_LOG_TYPES = new Set(['lottery_opened','lottery_drawn','lottery_pick']);

function renderArchiveTable(openMonths){
  const entries = state.archive.filter(e => !LOTTERY_LOG_TYPES.has(e.type));
  if(!entries.length) return `<div class="empty">No actions logged yet.</div>`;

  const groups = {};
  const now = new Date();
  const currentKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  for(const e of entries){
    const d = new Date(e._creationTime);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!groups[key]){
      groups[key] = {
        label: d.toLocaleDateString('en-GB',{month:'long',year:'numeric'}),
        entries: []
      };
    }
    groups[key].entries.push(e);
  }

  return Object.keys(groups).sort().reverse().map(key=>{
    const {label,entries} = groups[key];
    // Open if: current month, OR was manually opened before re-poll
    const isOpen = key===currentKey || (openMonths&&openMonths.has(key));
    return `<details class="log-month"${isOpen?' open':''} data-key="${key}">
      <summary>
        <span class="log-month-arrow">▶</span>
        <span class="log-month-name">${label}</span>
        <span class="log-month-count">${entries.length} entr${entries.length===1?'y':'ies'}</span>
      </summary>
      <div>${renderMonthRows(entries)}</div>
    </details>`;
  }).join('');
}

function renderMonthRows(entries){
  const admin=isAdmin(state.user);
  const labels={crafted:'Crafted',material_added:'Added',material_removed:'Removed',material_moved:'Moved',item_created:'New Item',item_deleted:'Deleted Item',item_handed_out:'Handed Out',user_joined:'Joined',role_approved:'Role Approved',role_denied:'Role Denied',crafter_approved:'Crafter Approved',crafter_denied:'Crafter Denied',admin_granted:'Admin Granted',member_removed:'Member Removed',task_created:'Task Created',task_accepted:'Task Accepted',task_completed:'Task Completed',lottery_opened:'Lottery Opened',lottery_drawn:'Lottery Drawn',lottery_pick:'Lottery Pick'};
  return `<table>
    <thead><tr><th>Date</th><th>Action</th><th>User</th><th>Details</th>${admin?'<th></th>':''}</tr></thead>
    <tbody>${entries.map(e=>`<tr>
      <td style="font-size:18px;color:var(--fg);white-space:nowrap;">${fmtDT(e._creationTime)}</td>
      <td><span class="badge badge-${e.type}">${labels[e.type]||e.type}</span></td>
      <td style="font-weight:600;font-size:18px;">${esc(e.userName)}</td>
      <td style="font-size:18px;color:var(--fg);">${fmtArchiveDetails(e)}</td>
      ${admin?`<td><button class="btn-del" onclick="adminDeleteLog('${esc(e._id)}')">✕</button></td>`:''}
    </tr>`).join('')}</tbody></table>`;
}
function fmtArchiveDetails(e){
  const d=e.details||{};
  switch(e.type){
    case 'material_added':
      return `${esc(d.materialName)} &middot; ${d.quantity} ${esc(d.unit||'')} &middot; q${d.quality} &middot; ${sysBadge(d.system)}${esc(d.location)}`;
    case 'material_removed':
      return `${esc(d.materialName)} &middot; ${d.quantity} ${esc(d.unit||'')} &middot; ${sysBadge(d.system)}${esc(d.location)}`;
    case 'crafted': {
      const lines=(d.materialsUsed||[]).map(m=>`${esc(m.materialName)} &times;${m.quantityUsed}${esc(m.unit||'')} (q${m.quality}, ${esc(m.ownerName)}, ${sysBadge(m.system)}${esc(m.location)})`).join(' | ');
      return `<strong>${esc(d.itemName)}</strong> &middot; avg q${d.avgQuality}<br><span style="font-size:18px;color:var(--fg);">${lines}</span>`; }
    case 'item_created':
      return `${esc(d.itemName)} &middot; ${(d.requirements||[]).map(r=>`${esc(r.materialName)}&times;${r.quantity}${esc(r.unit||'')}`).join(', ')}`;
    case 'item_deleted':
      return `${esc(d.itemName)}`;
    case 'user_joined':
      return `Roles: ${(d.roles||[]).join(', ')}`;
    case 'role_approved':    return `Approved <strong>${esc(d.targetUsername)}</strong> as ${esc(d.role||'?')}`;
    case 'role_denied':      return `Denied <strong>${esc(d.targetUsername)}</strong> ${esc(d.role||'?')} request`;
    case 'crafter_approved': return `Approved <strong>${esc(d.targetUsername)}</strong> as Crafter`;
    case 'crafter_denied':   return `Denied <strong>${esc(d.targetUsername)}</strong> crafter request`;
    case 'admin_granted':    return `Granted admin to <strong>${esc(d.targetUsername)}</strong>`;
    case 'item_handed_out':  return `${esc(d.itemName)}${d.quantity>1?` &times;${d.quantity}`:''} &middot; avg q${d.avgQuality} &middot; to <strong>${esc(d.handedOutTo)}</strong>`;
    case 'material_moved':   return `${esc(d.materialName)} &middot; ${d.quantity} ${esc(d.unit||'')} &middot; ${sysBadge(d.fromSystem)}${esc(d.fromLocation)} &rarr; ${sysBadge(d.toSystem)}${esc(d.toLocation)}`;
    case 'member_removed':   return `Removed <strong>${esc(d.targetUsername)}</strong>`;
    case 'task_created':     return `<strong>${esc(d.title)}</strong> &middot; ${esc(d.type)} &middot; ${esc(d.priority)}`;
    case 'task_accepted':    return `Accepted task: <strong>${esc(d.title)}</strong>`;
    case 'task_completed':   return `Completed task: <strong>${esc(d.title)}</strong>`;
    case 'lottery_opened':   return `<strong>${esc(d.title)}</strong> &middot; ${d.packages} package${d.packages!==1?'s':''}`;
    case 'lottery_drawn':    return `<strong>${esc(d.title)}</strong> &middot; ${d.packagesCount} package${d.packagesCount!==1?'s':''} drawn`;
    case 'lottery_pick':     return `<strong>${esc(d.lotteryTitle)}</strong> &middot; Package #${(d.pkgId||'').replace('pkg_','')} &middot; ${d.value} pts`;
    default: return JSON.stringify(d);
  }
}

function pageMember() {

  const myMatsRemoved = myLog.filter(e=>e.type==='material_removed').length;
  const myCrafted     = myLog.filter(e=>e.type==='crafted').length;
  const myTasksDone   = myLog.filter(e=>e.type==='task_completed').length;
  const myTasksAcc    = myLog.filter(e=>e.type==='task_accepted').length;

  // Roles the member has (non-pending, non-removed)
  const activeRoles = (u.roles||[]).filter(r=>!r.endsWith('_pending')&&r!=='removed');

    {id:'crafter',   label:'Crafter'},

  // Last 10 personal log entries

  const logLabels = {crafted:'Crafted',material_added:'Added',material_removed:'Removed',material_moved:'Moved',item_handed_out:'Handed Out',task_created:'Created Task',task_accepted:'Accepted Task',task_completed:'Completed Task',user_joined:'Joined'};

  return `
    <div class="page-head">
      <div class="page-head-left">
        <div class="page-title">${esc(u.username)}</div>
        <div class="page-sub" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;">
          ${activeRoles.map(r=>roleTagHtml(r)).join('')}
        </div>
      </div>
      ${noAdmin?`<button class="btn btn-outline" style="border-color:var(--red);color:var(--fg);font-size:18px;" onclick="claimBootstrapAdmin()">Claim Admin</button>`:''}
    </div>

    <div class="ov-stats" style="margin-bottom:40px;">
      <div class="ov-stat" style="padding-right:28px;">
        <div class="ov-stat-num">${myMatsAdded}</div>
        <div class="ov-stat-label">Materials Added</div>
        <div class="ov-stat-sub">${myMatsRemoved} removed</div>
      </div>
      <div class="ov-stat" style="padding-left:28px;padding-right:28px;">
        <div class="ov-stat-num">${myCrafted}</div>
        <div class="ov-stat-label">Items Crafted</div>
        <div class="ov-stat-sub">&nbsp;</div>
      </div>
      <div class="ov-stat" style="padding-left:28px;padding-right:28px;">
        <div class="ov-stat-num">${myTasksDone}</div>
        <div class="ov-stat-label">Tasks Completed</div>
        <div class="ov-stat-sub">${myTasksAcc} accepted total</div>
      </div>
      <div class="ov-stat" style="padding-left:28px;">
        <div class="ov-stat-num">${myLog.length}</div>
        <div class="ov-stat-label">Total Actions</div>
        <div class="ov-stat-sub">&nbsp;</div>
      </div>
    </div>

    ${requestable.length||pending.length?`
    <div style="margin-bottom:40px;">
      <div style="font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;color:var(--fg);">Role Requests</div>
      ${pending.length?`
      <div style="margin-bottom:12px;font-size:18px;color:var(--fg);">
        ${pending.map(r=>`<span style="margin-right:16px;">⏳ <strong>${r.label}</strong> — pending admin approval</span>`).join('')}
      </div>`:''}
      ${requestable.length?`
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${requestable.map(r=>`<button class="btn btn-outline btn-sm" onclick="requestRole('${r.id}','${r.label}')">Request ${r.label}</button>`).join('')}
      </div>`:''}
    </div>`:''}

    ${recentActivity.length?`
    <div>
      <div style="font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;color:var(--fg);">Recent Activity</div>
      <table>
        <thead><tr><th>Date</th><th>Action</th><th>Details</th></tr></thead>
        <tbody>${recentActivity.map(e=>`<tr>
          <td style="font-size:18px;color:var(--fg);white-space:nowrap;">${fmtDate(e._creationTime)}</td>
          <td><span class="badge badge-${e.type}">${logLabels[e.type]||e.type}</span></td>

async function requestRole(role, label) {
  if(!confirm(`Request ${label} role? An admin will need to approve it.`)) return;

    await convexMutation('users:requestRole',{sessionToken:state.sessionToken,role});
    toast(`${label} role requested — pending admin approval`);
    await refreshAll();
  } catch(e){alert(e.message);}
}

}

async function confirmMove(matId) {
  const toSystem=(document.getElementById('mv-sys')||{value:''}).value;
  const toLocation=(document.getElementById('mv-loc')||{value:''}).value;
  if(!toSystem||!toLocation){alert('Select a destination system and location');return;}
  const isPartial=(document.getElementById('mv-partial')||{checked:false}).checked;
  let partialQty=undefined;
  if(isPartial){
    partialQty=parseFloat((document.getElementById('mv-qty')||{value:''}).value);
    if(isNaN(partialQty)||partialQty<=0){alert('Enter a valid quantity');return;}
  }
  try {
    await convexMutation('materials:move',{id:matId,sessionToken:state.sessionToken,toSystem,toLocation,...(partialQty?{partialQty}:{})});
    closeModal();
    toast('Material moved');
    await refreshAll();
  } catch(e){alert(e.message);}
}

function setInvFilter(f) {
  invFilter=f;
  renderPage();
}

function setInvCatFilter(f) {
  invCatFilter=f;
  const tabs=document.getElementById('inv-cat-tabs');
  if(tabs) tabs.querySelectorAll('.filter-tab').forEach(btn=>{
    const isAll=f==='all'&&btn.textContent.trim()==='All';
    const isCat=ITEM_CATEGORIES.some(c=>c.id===f&&c.label===btn.textContent.trim());
    btn.classList.toggle('active',isAll||isCat);
  });
  const el=document.getElementById('inv-list'); if(el) el.innerHTML=renderInvList();
}

function renderInvList() {
  const u=state.user;
  const admin=isAdmin(u);
  const canHandOut=u.roles.includes('crafter')||u.roles.includes('logistics')||admin;
  let items=state.inventory.filter(i=>i.status===invFilter);
  if(invCatFilter!=='all') items=items.filter(i=>i.category===invCatFilter);
  if(invSearch.trim()) {
    const q=invSearch.trim().toLowerCase();
    items=items.filter(i=>(i.itemName||'').toLowerCase().includes(q)||(i.craftedByName||'').toLowerCase().includes(q)||(i.handedOutTo||'').toLowerCase().includes(q));
  }
  items=items.slice().sort((a,b)=>b._creationTime-a._creationTime);
  if(!items.length) return `<div class="empty">${invFilter==='available'?'No crafted items in stock yet.':'No items have been handed out yet.'}</div>`;

  if(invFilter==='available') {
    return items.map(item=>`
      <div class="inv-row" style="display:flex;gap:24px;align-items:flex-start;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
            ${item.category?`<span class="item-cat-tag">${esc(itemCatLabel(item.category))}</span>`:''}
            <span style="font-size:24px;font-weight:700;">${esc(item.itemName)}</span>
            <span style="font-size:18px;font-weight:700;color:var(--fg);">&times;${item.quantity}</span>
          </div>
          <div style="display:flex;gap:20px;font-size:18px;color:var(--fg);flex-wrap:wrap;">
            <span>Avg quality: <strong style="color:var(--fg);">${item.avgQuality}</strong> <span style="color:var(--fg);">${qualLabel(item.avgQuality)}</span></span>
            <span>Crafted by: <strong style="color:var(--fg);">${esc(item.craftedByName)}</strong></span>
            <span>${sysBadge(item.system)}${esc(item.location)}</span>
            <span style="color:var(--fg);">${fmtDate(item._creationTime)}</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          ${canHandOut?`<button class="btn btn-black btn-sm" onclick="openHandOutModal('${esc(item._id)}')">Hand Out</button>`:''}
          ${admin?`<button class="btn-del" onclick="adminDeleteInventory('${esc(item._id)}')">✕</button>`:''}
        </div>
      </div>`).join('');
  } else {
    // Handed out archive
    return `<table>
      <thead><tr><th>Item</th><th>Qty</th><th>Avg Quality</th><th>Crafted By</th><th>Handed To</th><th>By</th><th>Date</th>${admin?'<th></th>':''}</tr></thead>
      <tbody>${items.map(item=>`<tr>
        <td>
          ${item.category?`<span class="item-cat-tag" style="font-size:9px;">${esc(itemCatLabel(item.category))}</span> `:''}
          <strong>${esc(item.itemName)}</strong>
        </td>
        <td style="font-weight:700;">&times;${item.quantity}</td>
        <td><span class="q">${item.avgQuality}</span></td>
        <td style="font-size:18px;">${esc(item.craftedByName)}</td>
        <td style="font-weight:600;">${esc(item.handedOutTo||'—')}</td>
        <td style="font-size:18px;">${esc(item.handedOutByName||'—')}</td>
        <td style="font-size:18px;color:var(--fg);white-space:nowrap;">${fmtDate(item._creationTime)}</td>
        ${admin?`<td><button class="btn-del" onclick="adminDeleteInventory('${esc(item._id)}')">✕</button></td>`:''}
      </tr>`).join('')}</tbody></table>`;
  }
}

function onHOMemberChange() {
  const val=(document.getElementById('ho-member-sel')||{value:''}).value;
  const wrap=document.getElementById('ho-custom-wrap');
  if(wrap) wrap.style.display=val==='__custom__'?'block':'none';
}

async function confirmHandOut(invId) {
  const qty=parseInt((document.getElementById('ho-qty')||{value:'1'}).value)||0;
  const selVal=(document.getElementById('ho-member-sel')||{value:''}).value;
  let recipient='';
  if(selVal==='__custom__') recipient=(document.getElementById('ho-custom-name')||{value:''}).value.trim();
  else recipient=selVal;
  if(!recipient){alert('Select or enter a recipient');return;}
  if(qty<1){alert('Quantity must be at least 1');return;}
  const u=state.user;
  try {
    await convexMutation('inventory:handOut',{
      sessionToken:state.sessionToken,
      id:invId,
      quantity:qty,
      handedOutTo:recipient,
    });
    closeModal();
    toast(`Handed out to ${recipient}`);
    invFilter='handed_out';
    await refreshAll();
    goTo('inventory');
  } catch(e){alert(e.message);}
}

async function adminDeleteInventory(id) {
  if(!confirm('Delete this inventory entry?')) return;
  try {
    await convexMutation('inventory:remove',{id,sessionToken:state.sessionToken});
    toast('Entry deleted');
    await refreshAll();
  } catch(e){alert(e.message);}
}

function pageAdmin() {
  const u=state.user;
  if(!isAdmin(u)) return `<div class="page-head"><div class="page-title">Admin</div></div><p style="color:var(--fg);margin-top:24px;">Access denied.</p>`;
  return `
    <div class="page-head">
      <div class="page-head-left">
        <div class="page-title">Admin</div>
        <div class="page-sub">Manage members and role applications</div>
      </div>
    </div>
    <div id="admin-wrap">${renderAdminContent()}</div>`;
}

function renderAdminContent() {
  const u=state.user;
  const PENDING_ROLES=[{pending:'crafter_pending',full:'crafter',label:'Crafter'},{pending:'logistics_pending',full:'logistics',label:'Logistics'}];
  const pending=state.allUsers.filter(m=>PENDING_ROLES.some(r=>m.roles.includes(r.pending)));
  const members=state.allUsers.filter(m=>m._id!==u._id);
  return `
    ${pending.length?`
    <div style="margin-bottom:40px;">
      <div style="font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border);">
        Pending Crafter Applications <span style="background:var(--red);color:#fff;padding:1px 8px;font-size:18px;margin-left:8px;">${pending.length}</span>
      </div>
      ${pending.map(m=>{
        const pendingRoles=PENDING_ROLES.filter(r=>m.roles.includes(r.pending));
        return pendingRoles.map(pr=>`
        <div style="display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--border-m);">
          <div style="font-weight:700;font-size:18px;flex:1;">${esc(m.username)}</div>
          <div style="font-size:18px;color:var(--fg);">requesting <strong>${pr.label}</strong> role</div>
          <div style="font-size:18px;color:var(--fg);">${m.roles.filter(r=>r!==pr.pending).join(', ')||'—'}</div>
          <button class="btn btn-black btn-sm" onclick="adminApproveRole('${esc(m._id)}','${esc(m.username)}','${pr.pending}','${pr.full}')">✓ Approve</button>
          <button class="btn btn-outline btn-sm" onclick="adminDenyRole('${esc(m._id)}','${esc(m.username)}','${pr.pending}')">✕ Deny</button>
        </div>`).join('');
      }).join('')}
    </div>`:''}

    <div>
      <div style="font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border);">All Members</div>
      ${state.allUsers.map(m=>{
        const isMe = m._id===u._id;
        const removed = m.roles.includes('removed');
        const MANAGEABLE = ['provider','crafter','logistics'];
        return `<div style="display:flex;align-items:flex-start;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-m);flex-wrap:wrap;">
          <div style="min-width:140px;">
            <div style="font-weight:700;font-size:18px;">${esc(m.username)}${isMe?' <span style="color:var(--fg);font-size:18px;">(you)</span>':''}</div>
            <div style="margin-top:4px;">${m.roles.map(r=>roleTagHtml(r)).join(' ')}</div>
          </div>
          ${!removed?`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1;">
            ${MANAGEABLE.map(role=>{
              const has = m.roles.includes(role);
              const pending = m.roles.includes(role+'_pending');
              if(has) return `<button class="btn-ghost btn-sm" style="border-color:#fca5a5;color:#ef4444;" onclick="adminRevokeRole('${esc(m._id)}','${esc(m.username)}','${role}')">− ${role.charAt(0).toUpperCase()+role.slice(1)}</button>`;
              if(pending) return `<button class="btn btn-black btn-sm" onclick="adminApproveRole('${esc(m._id)}','${esc(m.username)}','${role}_pending','${role}')">✓ ${role.charAt(0).toUpperCase()+role.slice(1)}?</button>`;
              return `<button class="btn-ghost btn-sm" onclick="adminDirectGrantRole('${esc(m._id)}','${esc(m.username)}','${role}')">+ ${role.charAt(0).toUpperCase()+role.slice(1)}</button>`;
            }).join('')}
            ${!m.roles.includes('admin')&&!isMe?`<button class="btn-ghost btn-sm" onclick="adminGrantAdmin('${esc(m._id)}','${esc(m.username)}')">+ Admin</button>`:''}
          </div>
          <div style="margin-left:auto;">
            ${!isMe?`<button class="btn-del" onclick="adminRemoveMember('${esc(m._id)}','${esc(m.username)}')">Remove</button>`:''}
          </div>`:`<div style="color:#ef4444;font-size:18px;align-self:center;">Removed</div>`}
        </div>`;
      }).join('')}
    </div>`;
}

async function adminApproveRole(targetId, targetName, pendingRole, fullRole) {
  const label=fullRole.charAt(0).toUpperCase()+fullRole.slice(1);
  if(!confirm(`Approve ${targetName} as ${label}?`)) return;
  try {
    await convexMutation('users:approveRole',{sessionToken:state.sessionToken,targetUserId:targetId,pendingRole,fullRole});
    toast(`${targetName} approved as ${label}`);
    await refreshAll();
  } catch(e){alert(e.message);}
}

async function adminDenyRole(targetId, targetName, pendingRole) {

function addEditReqRow() {
  const container=document.getElementById('ei-req-rows'); if(!container) return;
  const div=document.createElement('div');
  div.className='req-row';
  div.style.cssText='display:flex;gap:10px;margin-bottom:8px;align-items:center;';
  div.innerHTML=`
    <select class="req-mat" style="flex:2;margin:0;" onchange="onReqMatChange(this)">${catalogOptgroups()}</select>
    <input type="number" class="req-qty" placeholder="Qty" min="0.01" step="0.01" style="flex:1;margin:0;">
    <span class="req-unit unit-inline" style="min-width:32px;"></span>
    <button class="btn-ghost btn-sm" onclick="this.parentNode.remove()">✕</button>`;
  container.appendChild(div);
  // trigger unit display for first option
  const sel=div.querySelector('.req-mat'); if(sel) onReqMatChange(sel);
}

async function confirmEditItem(itemId) {
  const name=(document.getElementById('ei-name')||{value:''}).value.trim();
  const category=(document.getElementById('ei-cat')||{value:''}).value;
  if(!name){alert('Enter item name');return;}
  const rows=document.querySelectorAll('#ei-req-rows .req-row');
  const requirements=[];
  rows.forEach(r=>{
    const mat=r.querySelector('.req-mat')?.value;
    const qty=parseFloat(r.querySelector('.req-qty')?.value);
    if(mat&&!isNaN(qty)&&qty>0) requirements.push({materialName:mat,quantity:qty,unit:unitFor(mat)});
  });
  if(!requirements.length){alert('Add at least one requirement');return;}
  try {
    await convexMutation('craftItems:update',{id:itemId,sessionToken:state.sessionToken,name,category,requirements});
    toast('Item updated');
    closeModal();
    await refreshAll();
  } catch(e){alert(e.message);}
}

const TASK_PRIORITIES = [
  {id:'urgent',  label:'Urgent',   cls:'p-urgent'},
  {id:'high',    label:'High',     cls:'p-high'},
  {id:'normal',  label:'Normal',   cls:'p-normal'},
  {id:'whenever',label:'Whenever', cls:'p-whenever'},
];
const TASK_TYPES = [
  {id:'gather',  label:'Gather Material'},
  {id:'craft',   label:'Craft Item'},
  {id:'deliver', label:'Deliver'},
  {id:'other',   label:'Other / Custom'},
];
const TASK_TARGET_ROLES = [
  {id:'provider',  label:'Provider'},
  {id:'crafter',   label:'Crafter'},
  {id:'logistics', label:'Logistics'},
];

function pageTasks() {

  return `
    <div class="page-head">
      <div class="page-head-left">
        <div class="page-title">Tasks</div>
        <div class="page-sub">${openCount} open task${openCount!==1?'s':''}</div>
      </div>
      ${admin||u.roles.includes('crafter')?`<button class="btn btn-black" onclick="openCreateTaskModal()">+ Create Task</button>`:''}
    </div>
    ${!tasksSearchActive?`<div style="display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
      <span style="font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg);">Role:</span>
      <button class="btn-ghost btn-sm${tasksRoleFilter===''?' active':''}" onclick="setTasksRoleFilter('')">All</button>
      <button class="btn-ghost btn-sm${tasksRoleFilter==='provider'?' active':''}" onclick="setTasksRoleFilter('provider')">Provider</button>
      <button class="btn-ghost btn-sm${tasksRoleFilter==='crafter'?' active':''}" onclick="setTasksRoleFilter('crafter')">Crafter</button>

}

function setTasksFilter(f) {
  tasksFilter=f;
  tasksSearchActive=false;
  tasksSearch='';
  renderNav();
  renderPage();
}
function setTasksRoleFilter(role) {
  tasksRoleFilter=role;
  renderPage();
}
function toggleTaskSearch() {
  tasksSearchActive=!tasksSearchActive;
  if(!tasksSearchActive) tasksSearch='';
  renderNav();
  renderPage();
  if(tasksSearchActive) setTimeout(()=>{const inp=document.getElementById('task-search-inp');if(inp)inp.focus();},50);
}

function taskRoleBadge(role) {
  const map={provider:'rb-provider',crafter:'rb-crafter',logistics:'rb-logistics',admin:'rb-admin'};
  const labels={provider:'Provider',crafter:'Crafter',logistics:'Logistics',admin:'Admin'};
  return `<span class="role-badge ${map[role]||''}">${labels[role]||role}</span>`;
}

function taskTypeDesc(t) {
  switch(t.type) {
    case 'gather':  {
      let s=`Gather <strong>${esc(t.materialName||'?')}</strong>`;
      if(t.quantity) s+=` &times;${t.quantity}${t.unit?` ${esc(t.unit)}`:''}`;
      if(t.qualityMin||t.qualityMax) s+=` &middot; quality ${t.qualityMin||0}–${t.qualityMax||1000}`;
      return s; }
    case 'craft':   {
      let s=`Craft <strong>${esc(t.itemName||'?')}</strong>`;
      if(t.quantity) s+=` &times;${t.quantity}`;
      if(t.qualityMin||t.qualityMax) s+=` &middot; quality ${t.qualityMin||0}–${t.qualityMax||1000}`;
      return s; }
    case 'deliver': {
      let s=`Deliver`;
      if(t.materialName) s+=` <strong>${esc(t.materialName)}</strong>`;
      if(t.quantity) s+=` &times;${t.quantity}${t.unit?` ${esc(t.unit)}`:''}`;
      if(t.fromSystem) s+=` &mdash; from ${sysBadge(t.fromSystem)}${esc(t.fromLocation||'')}`;
      if(t.toSystem) s+=` to ${sysBadge(t.toSystem)}${esc(t.toLocation||'')}`;
      return s; }
    default: return esc(t.description||'');
  }
}

function renderTasksList() {
  const u=state.user; const admin=isAdmin(u);
  let tasks;
  if(tasksSearchActive) {
    // Search across all statuses
    tasks=state.tasks;
    if(!admin) tasks=tasks.filter(t=>t.targetRoles.some(r=>u.roles.includes(r)));
    if(tasksSearch.trim()) {
      const q=tasksSearch.trim().toLowerCase();
      tasks=tasks.filter(t=>t.title.toLowerCase().includes(q)||(t.materialName||'').toLowerCase().includes(q)||(t.itemName||'').toLowerCase().includes(q));
    }
    if(!tasks.length) return `<div class="empty">No tasks match "${esc(tasksSearch)}".</div>`;
  } else if(tasksFilter==='accepted') {
    // Any open task with at least one active acceptee; non-admins only see tasks they personally accepted
    tasks=state.tasks.filter(t=>t.status==='open'&&t.acceptees.some(a=>a.status!=='completed'));
    if(!admin) tasks=tasks.filter(t=>t.acceptees.some(a=>a.userId===u._id&&a.status!=='completed'));
    if(!tasks.length) return `<div class="empty">No accepted tasks yet.</div>`;
  } else {
    tasks=state.tasks.filter(t=>t.status===tasksFilter);
    // Open tab: only show tasks that still have at least one available slot
    if(tasksFilter==='open') tasks=tasks.filter(t=>t.acceptees.filter(a=>a.status!=='completed').length<t.slots);
    if(!admin) tasks=tasks.filter(t=>t.targetRoles.some(r=>u.roles.includes(r)));
    if(tasksRoleFilter) tasks=tasks.filter(t=>t.targetRoles.includes(tasksRoleFilter));
    if(!tasks.length) return `<div class="empty">No ${tasksFilter} tasks${tasksRoleFilter?' for '+tasksRoleFilter:(!admin?' for your role':'')} yet.</div>`;
  }
  tasks=tasks.slice().sort((a,b)=>{
    const po={urgent:0,high:1,normal:2,whenever:3};
    return (po[a.priority]??2)-(po[b.priority]??2)||b._creationTime-a._creationTime;
  });
  return tasks.map(t=>{
    const myAcceptee=t.acceptees.find(a=>a.userId===u._id);
    const activeSlots=t.acceptees.filter(a=>a.status!=='completed').length;
    const slotsLeft=t.slots-activeSlots;
    const isFull=slotsLeft<=0;
    const pb=TASK_PRIORITIES.find(p=>p.id===t.priority)||TASK_PRIORITIES[2];
    return `<div class="task-card ${t.priority} ${t.status}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
            <span class="p-badge ${pb.cls}">${pb.label}</span>
            <span class="task-card-title">${esc(t.title)}</span>
            ${t.targetRoles.map(r=>taskRoleBadge(r)).join('')}
          </div>
          <div style="font-size:18px;color:var(--fg);margin-bottom:10px;line-height:1.5;">${taskTypeDesc(t)}</div>
          <div style="font-size:18px;color:var(--fg);display:flex;gap:16px;flex-wrap:wrap;">
            <span>${activeSlots}/${t.slots} slots</span>
            <span>${t.acceptees.length?t.acceptees.map(a=>`<strong style="color:${a.status==='completed'?'var(--red)':'#000'};font-size:18px;">${a.status==='completed'?`completed ${esc(a.userName)}`:`accepted by ${esc(a.userName)}`}</strong>`).join(', '):'no acceptees'}</span>
            <span style="color:var(--fg);">by ${esc(t.createdByName)}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;padding-top:2px;">
          ${t.status==='open'&&!myAcceptee&&!isFull?`<button class="btn btn-black btn-sm" onclick="acceptTask('${esc(t._id)}')">Accept</button>`:''}
          ${t.status==='open'&&myAcceptee&&myAcceptee.status!=='completed'?`<button class="btn btn-outline btn-sm" onclick="completeTask('${esc(t._id)}')">Mark Done</button>`:''}
          ${t.status==='open'&&myAcceptee&&myAcceptee.status!=='completed'?`<button class="btn-ghost btn-sm" onclick="unacceptTask('${esc(t._id)}')">Withdraw</button>`:''}

          ${admin&&t.status==='open'?`<button class="btn-ghost btn-sm" onclick="adminCancelTask('${esc(t._id)}')">Cancel</button>`:''}
          ${admin?`<button class="btn-del" onclick="adminDeleteTask('${esc(t._id)}')">✕</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function onCTFromSysChange() {

}
function onCTToSysChange() {

async function confirmCreateTask() {
  const title=(document.getElementById('ct-title')||{value:''}).value.trim();
  const type=(document.getElementById('ct-type')||{value:'gather'}).value;
  const priorityEl=document.querySelector('input[name="ct-priority"]:checked');
  const priority=priorityEl?priorityEl.value:'normal';
  const targetRoles=[...document.querySelectorAll('.ct-role:checked')].map(c=>c.value);
  const slots=parseInt((document.getElementById('ct-slots')||{value:'1'}).value)||1;
  if(!title){alert('Enter a task title');return;}
  if(!targetRoles.length){alert('Select at least one target role');return;}
  const args={sessionToken:state.sessionToken,title,type,priority,targetRoles,slots};
  // Type-specific fields
  if(type==='gather'){
    let matSel=(document.getElementById('ct-material')||{value:''}).value;
    if(matSel==='__custom__') matSel=(document.getElementById('ct-material-custom')||{value:''}).value.trim();
    if(!matSel){alert('Select a material');return;}
    args.materialName=matSel;
    const q=parseFloat((document.getElementById('ct-qty')||{value:''}).value);
    if(!isNaN(q)&&q>0){args.quantity=q;args.unit=(document.getElementById('ct-unit')||{value:'SCU'}).value;}
    const qmin=parseInt((document.getElementById('ct-qmin')||{value:''}).value);
    const qmax=parseInt((document.getElementById('ct-qmax')||{value:''}).value);
    if(!isNaN(qmin)&&qmin>0) args.qualityMin=qmin;
    if(!isNaN(qmax)&&qmax>0) args.qualityMax=qmax;
  } else if(type==='craft'){
    args.itemName=(document.getElementById('ct-item')||{value:''}).value;
    if(!args.itemName){alert('Select an item');return;}
    const q=parseInt((document.getElementById('ct-qty')||{value:''}).value);
    if(!isNaN(q)&&q>0) args.quantity=q;
    const qmin=parseInt((document.getElementById('ct-qmin')||{value:''}).value);
    const qmax=parseInt((document.getElementById('ct-qmax')||{value:''}).value);
    if(!isNaN(qmin)&&qmin>0) args.qualityMin=qmin;
    if(!isNaN(qmax)&&qmax>0) args.qualityMax=qmax;
  } else if(type==='deliver'){
    args.materialName=(document.getElementById('ct-deliver-what')||{value:''}).value.trim();
    const q=parseFloat((document.getElementById('ct-qty')||{value:''}).value);
    if(!isNaN(q)&&q>0){args.quantity=q;args.unit=(document.getElementById('ct-unit')||{value:'SCU'}).value;}
    args.fromSystem=(document.getElementById('ct-from-sys')||{value:''}).value||undefined;
    args.fromLocation=(document.getElementById('ct-from-loc')||{value:''}).value||undefined;
    args.toSystem=(document.getElementById('ct-to-sys')||{value:''}).value||undefined;
    args.toLocation=(document.getElementById('ct-to-loc')||{value:''}).value||undefined;
  } else {
    args.description=(document.getElementById('ct-desc')||{value:''}).value.trim();
  }
  try {
    await convexMutation('tasks:create',args);
    closeModal();
    toast('Task created');
    tasksFilter='open';
    await refreshAll();
    goTo('tasks');
  } catch(e){alert(e.message);}
}

function lotteryCardHtml(l) {
  const u=state.user; const admin=isAdmin(u);
  const pkgs=l.packages||[];
  const winnerCount=pkgs.filter(p=>p.winner).length;
  const myWin=pkgs.find(p=>p.winner&&p.winner.id===u._id);
  const myHatCount=pkgs.filter(p=>(p.interested||[]).some(i=>i.id===u._id)).length;
  let statusBadge=l.status;
  let statusExtra='';
  if(l.status==='open'&&myHatCount>0) statusExtra=`<span style="font-size:18px;font-weight:700;color:#22c55e;">(entered in ${myHatCount} package${myHatCount!==1?'s':''})</span>`;
  if(l.status==='drawn'&&myWin) statusExtra=`<span style="font-size:18px;font-weight:700;color:#22c55e;">(you won Package ${myWin.pkgId.replace('pkg_','')})</span>`;
  return `<div class="lottery-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px;">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
          <span style="font-size:24px;font-weight:900;">${esc(l.title)}</span>
          <span class="lottery-status ${l.status}">${statusBadge}</span>
          ${statusExtra}
        </div>
        <div style="font-size:18px;color:var(--fg);display:flex;gap:20px;flex-wrap:wrap;">
          <span>${l.items.length} component${l.items.length!==1?'s':''}</span>
          ${pkgs.length?`<span>${pkgs.length} packages${l.status==='drawn'?' &middot; '+winnerCount+' winners':''}</span>`:''}
          <span>by ${esc(l.createdByName)}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
        <button class="btn btn-black btn-sm" onclick="openLotteryDetail('${esc(l._id)}')">View</button>
        ${admin?`<button class="btn-del" onclick="deleteLottery('${esc(l._id)}')">x</button>`:''}
      </div>
    </div>
  </div>`;
}

function renderCompCatalogList(lotteryId) {
  let filtered=COMPONENTS_CATALOG;
  if(lotteryCompTypeFilter!=='all') filtered=filtered.filter(c=>c.type===lotteryCompTypeFilter);
  if(lotteryCompSizeFilter!=='all') filtered=filtered.filter(c=>c.size===parseInt(lotteryCompSizeFilter));
  if(lotteryCompGradeFilter!=='all') filtered=filtered.filter(c=>c.tier===lotteryCompGradeFilter);
  if(lotteryCompClassFilter!=='all') filtered=filtered.filter(c=>c.grade===lotteryCompClassFilter);
  if(lotteryCompSearch.trim()) {
    const q=lotteryCompSearch.trim().toLowerCase();
    filtered=filtered.filter(c=>c.name.toLowerCase().includes(q)||c.gradeName.toLowerCase().includes(q));
  }
  if(!filtered.length) return `<div style="padding:20px;font-size:18px;color:var(--fg);">No components match.</div>`;
  return filtered.map(c=>{
    const itemId=`${c.type}_${c.name.replace(/\s+/g,'_')}_${c.grade}_${c.size}_${c.tier}`;
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border-m);">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;">
          <span style="font-size:18px;font-weight:700;color:var(--fg);" class="comp-grade-${c.grade.toLowerCase()}">${esc(c.name)}</span>
          <span style="font-size:18px;color:var(--fg);">S${c.size}<span class="tier-${c.tier.toLowerCase()}"> ${c.tier}</span></span>
        </div>
        <div style="font-size:18px;color:var(--fg);opacity:.7;">${esc(c.typeName)} &middot; ${esc(c.gradeName)}</div>
      </div>
      <button class="btn btn-black btn-sm" style="white-space:nowrap;" onclick="addLotteryItem('${esc(lotteryId)}','${esc(itemId)}','${esc(c.name)}','${esc(c.type)}','${esc(c.typeName)}','${esc(c.grade)}',${c.size},'${esc(c.tier)}')">Add</button>
    </div>`;
  }).join('');
}

function renderExtNameRow(l, pkgs, name) {
  const entered=pkgs.filter(p=>(p.interested||[]).some(i=>i.id==='ext_'+name));
  const notEntered=pkgs.filter(p=>!(p.interested||[]).some(i=>i.id==='ext_'+name));
  return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-m);flex-wrap:wrap;">
    <span style="font-size:18px;font-weight:700;min-width:160px;">${esc(name)}</span>
    <span style="font-size:18px;color:var(--fg);">${entered.length?'Entered: '+entered.map(p=>'Pkg '+p.pkgId.replace('pkg_','')).join(', '):'Not entered yet'}</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;">
      ${notEntered.length?`<button class="btn btn-black btn-sm" onclick="doEnterAllPackages('${esc(l._id)}','${esc(name)}')">Enter All</button>`:''}
      ${pkgs.map(p=>{
        const isIn=(p.interested||[]).some(i=>i.id==='ext_'+name);
        const n=p.pkgId.replace('pkg_','');
        return isIn
          ? `<button class="btn-del" style="padding:3px 8px;" onclick="doRemoveHat('${esc(l._id)}','${esc(p.pkgId)}','ext_${esc(name)}')">Leave Pkg ${n}</button>`
          : `<button class="btn-ghost btn-sm" onclick="doThrowHat('${esc(l._id)}','${esc(p.pkgId)}','${esc(name)}')">Enter Pkg ${n}</button>`;
      }).join('')}
      <button class="btn-del" onclick="doRemoveExternalName('${esc(l._id)}','${esc(name)}')">Remove</button>
    </div>
  </div>`;
}

// Targeted refresh for the open lottery view — preserves scroll and focus
function refreshLotteryOpenView(lotteryId) {
  const l=state.lotteries.find(x=>x._id===lotteryId);
  if(!l) return;
  const pkgs=(l.packages||[]).slice().sort((a,b)=>b.totalValue-a.totalValue);
  const extNames=l.externalNames||[];
  const u=state.user;

  // Update packages grid
  const pkgsEl=document.getElementById('lottery-open-pkgs');
  if(pkgsEl) pkgsEl.innerHTML=pkgs.map(pkg=>renderPackageCard(pkg,l,false)).join('');

  // Update external participants list
  const extEl=document.getElementById('lottery-ext-list');
  if(extEl) extEl.innerHTML=extNames.length?`
    <div style="margin-bottom:24px;">
      ${extNames.map(name=>renderExtNameRow(l,pkgs,name)).join('')}
    </div>`:`<div style="font-size:18px;color:var(--fg);padding:12px 0;">No external participants added.</div>`;

  // Update status bar entry count
  const totalEntries=pkgs.reduce((s,p)=>s+(p.interested||[]).length,0);
  const statusEl=document.getElementById('lottery-open-status');
  if(statusEl) statusEl.textContent=`${totalEntries} entr${totalEntries!==1?'ies':'y'} across ${pkgs.length} packages.`;
}

function renderLotteryDrawnDetail(l) {
  const pkgs=(l.packages||[]).slice().sort((a,b)=>b.totalValue-a.totalValue);
  const winnerCount=pkgs.filter(p=>p.winner).length;
  // Collect all participants who entered but didn't win
  const allParticipantIds=new Set();
  pkgs.forEach(p=>(p.interested||[]).forEach(i=>allParticipantIds.add(i.id)));
  const winnerIds=new Set(pkgs.filter(p=>p.winner).map(p=>p.winner.id));
  const noWinners=[];
  pkgs.forEach(p=>(p.interested||[]).forEach(i=>{
    if(!winnerIds.has(i.id)&&!noWinners.some(x=>x.id===i.id)) noWinners.push(i);
  }));

  return `
    <div style="margin-bottom:24px;padding:20px;background:var(--bg2);border-left:4px solid #22c55e;">
      <div style="font-size:18px;font-weight:700;">Draw complete. ${winnerCount} of ${pkgs.length} packages assigned.</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px;">
      ${pkgs.map(pkg=>renderPackageCard(pkg,l,true)).join('')}
    </div>
    ${noWinners.length?`
    <div style="margin-top:8px;padding:16px 20px;background:var(--bg2);border:1.5px solid var(--border-l);">
      <div style="font-size:18px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">No Package Assigned</div>
      ${noWinners.map(p=>`<div style="font-size:18px;padding:4px 0;">${esc(p.name)} — no package won</div>`).join('')}
    </div>`:''}`;
}

function renderLotteryClosedDetail(l) {

function renderPackageCard(pkg, lottery, readOnly) {
  const u=state.user; const admin=isAdmin(u);
  const interested=pkg.interested||[];
  const iHaveHat=interested.some(i=>i.id===u._id);
  const isOpen=lottery.status==='open';
  const isDrawn=lottery.status==='drawn'||lottery.status==='closed';
  const winner=pkg.winner||null;
  const iWon=winner&&winner.id===u._id;
  let cardClass='pkg-card';
  if(iWon) cardClass+=' mine';
  else if(winner) cardClass+=' picked';

  return `<div class="${cardClass}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
      <div>
        <span style="font-size:20px;font-weight:900;">Package ${pkg.pkgId.replace('pkg_','')}</span>
        <span style="font-size:18px;margin-left:8px;font-weight:700;">${pkg.totalValue.toLocaleString()} pts</span>
      </div>
      ${isDrawn&&winner?`<span style="font-size:18px;font-weight:700;color:#22c55e;">${esc(winner.name)}</span>`:''}
      ${isDrawn&&!winner?`<span style="font-size:18px;color:var(--fg);opacity:.6;">Unassigned</span>`:''}
    </div>
    <div style="margin-bottom:10px;">
      ${pkg.items.map(item=>`
        <div class="pkg-item-row">
          <span class="comp-type-badge" style="font-size:9px;">${esc(item.typeName)}</span>
          <span style="font-weight:700;flex:1;font-size:18px;" class="comp-grade-${item.grade.toLowerCase()}">${esc(item.name)}</span>
          <span style="font-size:18px;color:var(--fg);">S${item.size}<span class="tier-${item.tier.toLowerCase()}"> ${item.tier}</span></span>
          <span style="font-size:18px;color:var(--fg);">${item.value} pts</span>
        </div>`).join('')}
    </div>
    ${isOpen&&!readOnly?`
    <div style="margin-top:8px;">
      <div style="font-size:18px;margin-bottom:8px;color:var(--fg);">${interested.length} interested${interested.length?': '+interested.map(i=>esc(i.name)).join(', '):''}.</div>
      ${iHaveHat
        ?`<button class="btn btn-outline btn-sm" style="width:100%;justify-content:center;" onclick="doRemoveHat('${esc(lottery._id)}','${esc(pkg.pkgId)}','${u._id}')">Leave</button>`
        :`<button class="btn btn-black" style="width:100%;justify-content:center;" onclick="doThrowHat('${esc(lottery._id)}','${esc(pkg.pkgId)}')">Enter</button>`}
    </div>`:''}
    ${isDrawn&&interested.length?`
    <div style="margin-top:8px;font-size:18px;color:var(--fg);">
      ${interested.map(i=>{
        const won=winner&&winner.id===i.id;
        return `<span style="${won?'color:#22c55e;font-weight:700;':'opacity:.7;'}">${esc(i.name)}${won?' (winner)':''}</span>`;
      }).join(', ')}
    </div>`:''}
  </div>`;
}

async function doEnterAllPackages(lotteryId, externalName) {

  if(!l) return;
  const pkgs=(l.packages||[]);
  const notEntered=pkgs.filter(p=>!(p.interested||[]).some(i=>i.id==='ext_'+externalName));
  for(const p of notEntered){
    try {
      await convexMutation('lotteries:throwHat',{sessionToken:state.sessionToken,lotteryId,pkgId:p.pkgId,externalName});
    } catch(e){ /* skip if already entered */ }
  }
  await refreshAll();
  refreshLotteryOpenView(lotteryId);
}

async function doEnterAllNamesAllPackages(lotteryId) {
  const l=state.lotteries.find(x=>x._id===lotteryId);
  if(!l) return;
  const pkgs=(l.packages||[]);
  const extNames=(l.externalNames||[]);
  for(const name of extNames){
    const notEntered=pkgs.filter(p=>!(p.interested||[]).some(i=>i.id==='ext_'+name));
    for(const p of notEntered){
      try {
        await convexMutation('lotteries:throwHat',{sessionToken:state.sessionToken,lotteryId,pkgId:p.pkgId,externalName:name});

  await refreshAll();
  refreshLotteryOpenView(lotteryId);
}
