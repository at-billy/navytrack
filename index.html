let _modalLastFocus = null;
function showModal(html) {
  const box=document.getElementById('modal-box');
  const overlay=document.getElementById('modal-overlay');
  _modalLastFocus = document.activeElement;
  if(box){
    box.setAttribute('role','dialog');
    box.setAttribute('aria-modal','true');
    box.innerHTML=`<button onclick="closeModal()" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:var(--text-lg);cursor:pointer;color:var(--fg);line-height:1;padding:4px 8px;" aria-label="Close">&times;</button>${html}`;
  }
  if(overlay) overlay.classList.add('open');
  // Move focus into the dialog (first real field, not the close button).
  setTimeout(()=>{
    if(!box) return;
    const first=box.querySelector('input,select,textarea,[contenteditable="true"]')
      || box.querySelector('button:not([aria-label="Close"])') || box;
    try{ first.focus(); }catch(e){}
  },0);
}
let _modalOnClose = null;
function closeModal() {
  const overlay=document.getElementById('modal-overlay');
  if(overlay) overlay.classList.remove('open');
  if(_modalLastFocus && _modalLastFocus.focus){ try{_modalLastFocus.focus(); }catch(e){} }
  _modalLastFocus=null;
  const cb=_modalOnClose; _modalOnClose=null;
  if(cb) cb();   // notify a pending confirmModal that the dialog was dismissed
}
function modalOverlayClick(e) {
  // clicking backdrop no longer closes — use the X button instead
}

// Styled, promise-based replacement for native confirm(). Resolves true/false.
// Accepts a message string or { title, body, confirmLabel, cancelLabel, danger }.
function confirmModal(opts){
  const o = (typeof opts==='string') ? { body: opts } : (opts || {});
  const title = o.title || 'Please confirm';
  const body = o.body || 'Are you sure?';
  const confirmLabel = o.confirmLabel || 'Confirm';
  const cancelLabel = o.cancelLabel || 'Cancel';
  // Auto-flag destructive confirms (red button) from the wording unless told explicitly.
  const danger = (o.danger!==undefined) ? !!o.danger
    : /\b(delete|remove|cannot be undone|permanently|revert|draw now)\b/i.test(body);
  return new Promise(resolve=>{
    let settled=false;
    const settle=(val)=>{ if(settled) return; settled=true; _modalOnClose=null; resolve(val); };
    showModal(`
      <div class="modal-title">${esc(title)}</div>
      <div style="font-size:var(--text-md);color:var(--fg);line-height:1.6;margin-bottom:28px;">${esc(body)}</div>
      <div style="display:flex;gap:10px;">
        <button class="btn ${danger?'btn-red':'btn-black'}" id="cm-yes">${esc(confirmLabel)}</button>
        <button class="btn btn-outline" id="cm-no">${esc(cancelLabel)}</button>
      </div>`);
    _modalOnClose = ()=>settle(false);   // Esc / × / dismiss = cancel
    const yes=document.getElementById('cm-yes'), no=document.getElementById('cm-no');
    if(yes) yes.onclick=()=>{ settle(true); closeModal(); };
    if(no)  no.onclick=()=>{ settle(false); closeModal(); };
    // Default focus to Cancel so a stray Enter never confirms a destructive action.
    setTimeout(()=>{ if(no) try{no.focus();}catch(e){} },0);
  });
}

// Global keyboard accessibility: Esc closes modals, Tab is trapped inside an
// open modal, and Enter/Space activate role="button" elements (the clickable divs).
document.addEventListener('keydown', e=>{
  const overlay=document.getElementById('modal-overlay');
  const modalOpen=overlay&&overlay.classList.contains('open');
  if(modalOpen && e.key==='Escape'){ e.preventDefault(); closeModal(); return; }
  if(modalOpen && e.key==='Tab'){
    const box=document.getElementById('modal-box');
    if(box){
      const f=[...box.querySelectorAll('a[href],button,input,select,textarea,[tabindex]:not([tabindex="-1"])')]
        .filter(el=>!el.disabled && el.offsetParent!==null);
      if(f.length){
        const first=f[0], last=f[f.length-1];
        if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
        else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
      }
    }
  }
  if((e.key==='Enter'||e.key===' ')){
    const t=e.target;
    if(t && t.getAttribute && t.getAttribute('role')==='button' && t.tabIndex>=0 && t.tagName!=='BUTTON'){
      e.preventDefault(); t.click();
    }
  }
});

function renderTasksList() {
  const u=state.user; const admin=isAdmin(u);
  let tasks;
  if(tasksSearchActive) {
    tasks=state.tasks;
    if(tasksSearch.trim()){const q=tasksSearch.trim().toLowerCase();tasks=tasks.filter(t=>t.title.toLowerCase().includes(q)||(t.description||'').toLowerCase().includes(q));}
    if(!tasks.length) return `<div class="empty">No projects match "${esc(tasksSearch)}".</div>`;
  } else if(tasksFilter==='mine') {
    tasks=state.tasks.filter(t=>t.members.some(m=>m.userId===u._id));
    if(!tasks.length) return `<div class="empty">You haven't joined any projects yet.</div>`;
  } else {
    tasks=state.tasks.filter(t=>t.status===tasksFilter);
    if(!tasks.length) return `<div class="empty">No ${tasksFilter} projects yet.</div>`;
  }
  tasks=tasks.slice().sort((a,b)=>{
    const po={urgent:0,high:1,normal:2,whenever:3};
    // In "Mine" (mixed statuses), surface open projects above closed/cancelled.
    const so=t=>t.status==='open'?0:1;
    return (so(a)-so(b))||(po[a.priority]??2)-(po[b.priority]??2)||b._creationTime-a._creationTime;
  });
  return tasks.map(t=>{
    const isMember=t.members.some(m=>m.userId===u._id);
    const pb=TASK_PRIORITIES.find(p=>p.id===t.priority)||TASK_PRIORITIES[2];
    const canManage=u.roles.some(r=>['admin','command','core'].includes(r));
    const isExpanded=expandedTasks.has(t._id);

    // Compute items progress for compact summary
    let itemsSummary='';
    if(t.requiredItems?.length){
      const total=t.requiredItems.reduce((s,r)=>s+r.quantityNeeded,0);
      const collected=t.requiredItems.reduce((s,r)=>{
        const inStock=state.navItems.filter(i=>i.status==='available'&&i.name===r.name&&i.category===r.category).reduce((s2,i)=>s2+i.quantity,0);
        return s+Math.min(inStock,r.quantityNeeded);
      },0);
      const pct=Math.round((collected/total)*100);
      const color=pct>=100?'#16a34a':pct>0?'inherit':'var(--fg)';
      itemsSummary=`<span style="font-size:var(--text-sm);color:${color};">· needs items · ${pct}%</span>`;
    }

    const buttons=`
      ${t.status==='open'&&!isMember?`<button class="btn btn-black btn-sm" onclick="event.stopPropagation();joinTask('${esc(t._id)}')">Join</button>`:''}
      ${t.status==='open'&&isMember?`<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();leaveTask('${esc(t._id)}')">Leave</button>`:''}
      ${(()=>{if(!canManage||t.status!=='open'||!t.requiredItems?.length)return'';const hasAvail=t.requiredItems.some(req=>state.navItems.some(i=>i.status==='available'&&i.name===req.name&&i.category===req.category));return hasAvail?`<button class="btn btn-black btn-sm" onclick="event.stopPropagation();useItemsForProject('${esc(t._id)}','${escJs(t.title)}')">Use items</button>`:'';})()}
      ${(canManage||t.createdBy===u._id)?`<button class="btn-ghost btn-sm" onclick="event.stopPropagation();openEditTaskModal('${esc(t._id)}')">Edit</button>`:''}
      ${canManage&&t.status==='open'?`<button class="btn-ghost btn-sm" onclick="event.stopPropagation();closeTask('${esc(t._id)}')">Close</button>`:''}
      ${canManage&&t.status==='closed'?`<button class="btn-ghost btn-sm" onclick="event.stopPropagation();reopenTask('${esc(t._id)}')">Reopen</button>`:''}
      ${admin?`<button class="btn-del" onclick="event.stopPropagation();deleteTask('${esc(t._id)}')" aria-label="Delete project">&times;</button>`:''}`;

    const joinLeaveBtn=`
      ${t.status==='open'&&!isMember?`<button class="btn btn-black btn-sm" onclick="event.stopPropagation();joinTask('${esc(t._id)}')">Join</button>`:''}
      ${t.status==='open'&&isMember?`<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();leaveTask('${esc(t._id)}')">Leave</button>`:''}`;
    const mgmtBtns=`
      ${(()=>{if(!canManage||t.status!=='open'||!t.requiredItems?.length)return'';const hasAvail=t.requiredItems.some(req=>state.navItems.some(i=>i.status==='available'&&i.name===req.name&&i.category===req.category));return hasAvail?`<button class="btn btn-black btn-sm" onclick="event.stopPropagation();useItemsForProject('${esc(t._id)}','${escJs(t.title)}')">Use items</button>`:'';})()}
      ${(canManage||t.createdBy===u._id)?`<button class="btn-ghost btn-sm" onclick="event.stopPropagation();openEditTaskModal('${esc(t._id)}')">Edit</button>`:''}
      ${canManage&&t.status==='open'?`<button class="btn-ghost btn-sm" onclick="event.stopPropagation();closeTask('${esc(t._id)}')">Close</button>`:''}
      ${canManage&&t.status==='closed'?`<button class="btn-ghost btn-sm" onclick="event.stopPropagation();reopenTask('${esc(t._id)}')">Reopen</button>`:''}
      ${admin?`<button class="btn-del" onclick="event.stopPropagation();deleteTask('${esc(t._id)}')" aria-label="Delete project">&times;</button>`:''}`;

    const membersLine = t.members.length
      ? `<strong>Members:</strong> ${t.members.map(m=>esc(m.userName)).join(', ')}`
      : `<span style="color:var(--fg);">No members yet</span>`;

    return `<div class="task-card ${t.priority} ${t.status}" onclick="toggleTaskExpand('${esc(t._id)}')" role="button" tabindex="0" aria-expanded="${isExpanded?'true':'false'}" aria-label="Project: ${esc(t.title)}" style="cursor:pointer;">
      <!-- Header row: priority + title + join/expand -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:6px;">
            <span class="p-badge ${pb.cls}">${pb.label}</span>
            <span class="task-card-title">${esc(t.title)}</span>
          </div>
          ${t.goal?`<div style="font-size:var(--text-md);margin-bottom:5px;">${esc(t.goal)}</div>`:''}
          ${t.description&&!t.goal?`<div style="font-size:var(--text-md);color:var(--fg);margin-bottom:5px;">${esc(t.description)}</div>`:''}
          <div style="font-size:var(--text-sm);margin-bottom:3px;">${membersLine}</div>
          ${itemsSummary?`<div style="font-size:var(--text-sm);margin-bottom:3px;">${itemsSummary}</div>`:''}
          <div style="font-size:var(--text-sm);color:var(--fg);">by ${esc(t.createdByName)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;padding-top:2px;">
          ${joinLeaveBtn}
          <span class="caret${isExpanded?' open':''}" aria-hidden="true" style="margin-left:2px;"></span>
        </div>
      </div>
      <!-- Expanded detail -->
      ${isExpanded?`
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-m);">
        ${t.goal&&t.description?`<div style="font-size:var(--text-md);color:var(--fg);margin-bottom:8px;">${esc(t.description)}</div>`:''}
        ${renderTaskRequiredItems(t)}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">${mgmtBtns}</div>
      </div>`:''}
    </div>`;
  }).join('');
}

function renderTaskRequiredItems(task) {
  if (!task.requiredItems?.length) return '';
  const rows = task.requiredItems.map(req => {
    const inStock = state.navItems.filter(i=>i.status==='available'&&i.name===req.name&&i.category===req.category).reduce((s,i)=>s+i.quantity,0);
    const collected = Math.min(inStock, req.quantityNeeded);
    const done = collected >= req.quantityNeeded;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;">
      <span style="font-size:var(--text-sm);">${esc(req.name)} <span style="font-size:var(--text-sm);color:var(--fg);">(${esc(itemCatLabel(req.category))})</span></span>
      <span style="font-size:var(--text-sm);font-weight:700;color:${done?'#16a34a':'inherit'};">${collected}/${req.quantityNeeded}</span>

  });
  return `<div style="margin:8px 0;padding:8px 10px;background:var(--bg);border:1px solid var(--border-m);">
    <div style="font-size:var(--text-xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg);margin-bottom:4px;">Required Items</div>

async function useItemsForProject(taskId, taskTitle) {
  let preview;
  try {
    preview = await convexQuery('tasks:previewUseItems',{sessionToken:state.sessionToken,taskId});
  } catch(e){ notifyError(e); return; }

  const plan = (preview && preview.plan) || [];
  const totalConsumed = (preview && preview.totalConsumed) || 0;

  const rows = plan.map(p=>{
    const full = p.shortfall===0;
    const head = `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;">
      <span style="font-size:var(--text-md);font-weight:700;">${esc(p.name)} <span style="font-size:var(--text-xs);color:var(--fg);font-weight:400;">(${esc(itemCatLabel(p.category))})</span></span>
      <span style="font-size:var(--text-sm);font-weight:700;color:${full?'#16a34a':'var(--red)'};">consume ${p.consumed}/${p.needed}${p.shortfall>0?` · ${p.shortfall} short`:''}</span>
    </div>`;
    const srcs = p.sources.length
      ? `<div style="margin:4px 0 0 0;font-size:var(--text-sm);color:var(--fg);">${p.sources.map(s=>`${s.take}× from ${esc(s.location)}${s.system?` (${esc(s.system)})`:''}`).join('<br>')}</div>`
      : `<div style="margin:4px 0 0 0;font-size:var(--text-sm);color:var(--red);">none available in inventory</div>`;
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border-m);">${head}${srcs}</div>`;
  }).join('');

  showModal(`
    <div class="modal-title">Use items — ${esc(taskTitle)}</div>
    <p style="font-size:var(--text-sm);color:var(--fg);margin-bottom:12px;">The following items will be marked as <strong>used</strong> for this project and removed from inventory. This cannot be undone.</p>
    <div style="max-height:320px;overflow-y:auto;">${rows||'<div class="empty">No required items.</div>'}</div>

      ${totalConsumed>0
        ? `<button class="btn btn-black" onclick="doUseItems('${escJs(taskId)}')">Confirm — use ${totalConsumed} item${totalConsumed!==1?'s':''}</button>`
        : `<button class="btn btn-black" disabled style="opacity:.5;cursor:not-allowed;">Nothing to use</button>`}
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
}

function renderCtItemResults() {
  const resultsEl = document.getElementById('ct-item-results');
  const listEl    = document.getElementById('ct-required-list');
  if (!resultsEl) return;

  // Build catalog: all Wikelo presets + any "other" items in inventory
  const seen = new Set();
  const types = [];

  // 1. Fixed Wikelo presets (always available to select, even if 0 in stock)
  for (const name of WIKELO_PRESETS) {
    if (name === 'Custom') continue; // skip the custom placeholder
    const key = `${name}||wikelo`;
    if (seen.has(key)) continue;
    seen.add(key);
    const inStock = state.navItems.filter(i=>i.status==='available'&&i.name===name&&i.category==='wikelo').reduce((s,i)=>s+i.quantity,0);
    types.push({ name, category: 'wikelo', inStock });
  }

  // 2. Any wikelo items in inventory not already in presets
  for (const item of state.navItems) {
    if (item.category !== 'wikelo') continue;
    const key = `${item.name}||wikelo`;
    if (seen.has(key)) continue;
    seen.add(key);
    const inStock = state.navItems.filter(i=>i.status==='available'&&i.name===item.name&&i.category==='wikelo').reduce((s,i)=>s+i.quantity,0);
    types.push({ name: item.name, category: 'wikelo', inStock });
  }

  // 3. Any "other" category items in inventory
  for (const item of state.navItems) {
    if (item.category !== 'other') continue;
    const key = `${item.name}||other`;
    if (seen.has(key)) continue;
    seen.add(key);
    const inStock = state.navItems.filter(i=>i.status==='available'&&i.name===item.name&&i.category==='other').reduce((s,i)=>s+i.quantity,0);
    types.push({ name: item.name, category: 'other', inStock });
  }

  types.sort((a,b)=>a.name.localeCompare(b.name));

  // Filter by search, exclude already-added
  const q = ctItemSearch.trim().toLowerCase();
  ctFilteredTypes = types.filter(t =>
    (!q || t.name.toLowerCase().includes(q) || itemCatLabel(t.category).toLowerCase().includes(q)) &&
    !ctRequiredItems.some(r=>r.name===t.name&&r.category===t.category)
  );

  resultsEl.innerHTML = ctFilteredTypes.length ? `
    <div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);">
      <table style="margin:0;width:100%;">
        <tbody>
          ${ctFilteredTypes.map((t,i)=>`<tr>
            <td style="font-size:var(--text-sm);font-weight:700;">${esc(t.name)}</td>
            <td style="font-size:var(--text-sm);color:var(--fg);">${esc(itemCatLabel(t.category))}</td>
            <td style="font-size:var(--text-sm);color:${t.inStock>0?'#16a34a':'var(--fg)'};">${t.inStock > 0 ? `${t.inStock} in stock` : 'not in stock'}</td>
            <td style="padding:4px 2px;"><input type="number" id="ctqty${i}" min="1" value="1" style="width:72px;margin:0;"></td>
            <td style="padding:4px 2px;"><button class="btn btn-black btn-sm" onclick="ctAddRequired(${i})">Add</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : `<div style="padding:8px;color:var(--fg);font-size:var(--text-sm);">${q?'No items match.':'No Wikelo or Other items found.'}</div>`;

  if (listEl) {
    listEl.innerHTML = ctRequiredItems.length ? `
      <div style="margin-top:10px;">
        <div style="font-size:var(--text-xs);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg);margin-bottom:6px;">Required for this project:</div>
        ${ctRequiredItems.map((r,i)=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-m);">
            <span style="font-size:var(--text-sm);">${esc(r.name)} <span style="color:var(--fg);font-size:var(--text-sm);">(${esc(itemCatLabel(r.category))})</span> &times; ${r.quantityNeeded}</span>
            <button class="btn-del" onclick="ctRemoveRequired(${i})" style="padding:2px 8px;" aria-label="Remove item">&times;</button>
          </div>`).join('')}
      </div>` : '';
  }
}

function ctAddRequired(idx) {
  const t = ctFilteredTypes[idx];
  if (!t) return;
  const qty = parseInt((document.getElementById(`ctqty${idx}`)||{value:'1'}).value);
  if (!qty || qty < 1) { toast('Enter a valid quantity'); return; }
  ctRequiredItems.push({ name: t.name, category: t.category, quantityNeeded: qty });
  renderCtItemResults();
}

function ctRemoveRequired(idx) {
  ctRequiredItems.splice(idx, 1);
  renderCtItemResults();
}

function ctAddCustom() {
  const name = (document.getElementById('ct-custom-name')||{value:''}).value.trim();
  const qty  = parseInt((document.getElementById('ct-custom-qty')||{value:'1'}).value);
  if (!name) { toast('Enter an item name'); return; }
  if (!qty || qty < 1) { toast('Enter a valid quantity'); return; }
  if (ctRequiredItems.some(r=>r.name===name)) { toast('Already added'); return; }
  ctRequiredItems.push({ name, category: 'other', quantityNeeded: qty });
  document.getElementById('ct-custom-name').value = '';
  document.getElementById('ct-custom-qty').value = '1';
  renderCtItemResults();
}

function lotteryCardHtml(l) {
  const u=state.user; const admin=canManageLottery(u);

  const winnerCount=pkgs.filter(p=>p.winner).length;
  const myWin=pkgs.find(p=>p.winner&&p.winner.id===u._id);
  const myHatCount=pkgs.filter(p=>(p.interested||[]).some(i=>i.id===u._id)).length;

  if(l.status==='open'&&myHatCount>0) statusExtra=`<span style="font-size:var(--text-md);font-weight:700;color:#22c55e;">(entered in ${myHatCount} package${myHatCount!==1?'s':''})</span>`;
  if(l.status==='drawn'&&myWin) statusExtra=`<span style="font-size:var(--text-md);font-weight:700;color:#22c55e;">(you won Package ${myWin.pkgId.replace('pkg_','')})</span>`;
  return `<div class="lottery-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px;">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">

        <div style="font-size:var(--text-md);color:var(--fg);display:flex;gap:20px;flex-wrap:wrap;">
          <span>${l.items.length} component${l.items.length!==1?'s':''}</span>
          ${pkgs.length?`<span>${pkgs.length} packages${l.status==='drawn'?' &middot; '+winnerCount+' winners':''}</span>`:''}

        <button class="btn btn-black btn-sm" onclick="openLotteryDetail('${esc(l._id)}')">View</button>

}

function renderCompCatalogList(lotteryId) {
  let filtered=COMPONENTS_CATALOG;
  if(lotteryCompTypeFilter!=='all') filtered=filtered.filter(c=>c.type===lotteryCompTypeFilter);
  if(lotteryCompSizeFilter!=='all') filtered=filtered.filter(c=>c.size===parseInt(lotteryCompSizeFilter));
  if(lotteryCompGradeFilter!=='all') filtered=filtered.filter(c=>c.tier===lotteryCompGradeFilter);
  if(lotteryCompClassFilter!=='all') filtered=filtered.filter(c=>c.grade===lotteryCompClassFilter);
  if(lotteryCompSearch.trim()) {
    const q=lotteryCompSearch.trim().toLowerCase();
    filtered=filtered.filter(c=>c.name.toLowerCase().includes(q)||c.gradeName.toLowerCase().includes(q));
  }
  if(!filtered.length) return `<div style="padding:20px;font-size:var(--text-md);color:var(--fg);">No components match.</div>`;
  return filtered.map(c=>{
    const itemId=`${c.type}_${c.name.replace(/\s+/g,'_')}_${c.grade}_${c.size}_${c.tier}`;
    return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border-m);">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;">
          <span style="font-size:var(--text-md);font-weight:700;color:var(--fg);" class="comp-grade-${c.grade.toLowerCase()}">${esc(c.name)}</span>
          <span style="font-size:var(--text-md);color:var(--fg);">S${c.size}<span class="tier-${c.tier.toLowerCase()}"> ${c.tier}</span></span>
        </div>
        <div style="font-size:var(--text-md);color:var(--fg);opacity:.7;">${esc(c.typeName)} &middot; ${esc(c.gradeName)}</div>
      </div>
      <button class="btn btn-black btn-sm" style="white-space:nowrap;" onclick="addLotteryItem('${esc(lotteryId)}','${esc(itemId)}','${esc(c.name)}','${esc(c.type)}','${esc(c.typeName)}','${esc(c.grade)}',${c.size},'${esc(c.tier)}')">Add</button>
    </div>`;
  }).join('');
}

  const pkgs=(l.packages||[]).slice().sort((a,b)=>b.totalValue-a.totalValue);
  const extNames=l.externalNames||[];
  const totalHats=pkgs.reduce((s,p)=>s+(p.interested||[]).length,0);

  return `
    <div style="margin-bottom:24px;padding:20px;background:var(--bg2);border-left:4px solid #22c55e;">
      <div style="font-size:var(--text-md);font-weight:700;">Lottery is open for entries.</div>
      <div style="margin-top:6px;font-size:var(--text-md);">Enter the packages you want. Admin will run the draw when ready.</div>
      <div style="margin-top:6px;font-size:var(--text-md);color:var(--fg);"><span id="lottery-open-status">${totalHats} entr${totalHats!==1?'ies':'y'} across ${pkgs.length} packages.</span></div>
    </div>
    <div id="lottery-open-pkgs" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px;">

    </div>

      <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <input type="text" id="ext-name-input" placeholder="Member name (not signed up)…" style="max-width:300px;margin:0;">
        <button class="btn btn-black btn-sm" onclick="doAddExternalName('${esc(l._id)}')">Add</button>
        ${extNames.length?`<button class="btn btn-black btn-sm" style="margin-left:8px;" onclick="doEnterAllNamesAllPackages('${esc(l._id)}')">Enter All Names in All Packages</button>`:''}
      </div>
      <div style="margin-bottom:16px;">
        <div style="font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">Import List</div>
        <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;">
          <textarea id="ext-bulk-input" placeholder="One name per line…" style="width:300px;height:100px;resize:vertical;border:1.5px solid #000;padding:8px 12px;font-size:var(--text-md);font-family:inherit;background:var(--bg);color:var(--fg);"></textarea>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button class="btn btn-black btn-sm" onclick="doBulkAddNames('${esc(l._id)}')">Import Pasted List</button>

      <div id="lottery-ext-list">
      ${extNames.length?`
      <div style="margin-bottom:24px;">
        ${extNames.map(name=>renderExtNameRow(l,pkgs,name)).join('')}
      </div>`:`<div style="font-size:var(--text-md);color:var(--fg);padding:12px 0;">No external participants added.</div>`}
      </div>
    </div>`:''}`;
}

function renderExtNameRow(l, pkgs, name) {
  const entered=pkgs.filter(p=>(p.interested||[]).some(i=>i.id==='ext_'+name));
  const notEntered=pkgs.filter(p=>!(p.interested||[]).some(i=>i.id==='ext_'+name));
  return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-m);flex-wrap:wrap;">
    <span style="font-size:var(--text-md);font-weight:700;min-width:160px;">${esc(name)}</span>
    <span style="font-size:var(--text-md);color:var(--fg);">${entered.length?'Entered: '+entered.map(p=>'Pkg '+p.pkgId.replace('pkg_','')).join(', '):'Not entered yet'}</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;">
      ${notEntered.length?`<button class="btn btn-black btn-sm" onclick="doEnterAllPackages('${esc(l._id)}','${escJs(name)}')">Enter All</button>`:''}
      ${pkgs.map(p=>{
        const isIn=(p.interested||[]).some(i=>i.id==='ext_'+name);
        const n=p.pkgId.replace('pkg_','');
        return isIn
          ? `<button class="btn-del" style="padding:3px 8px;" onclick="doRemoveHat('${esc(l._id)}','${esc(p.pkgId)}','ext_${escJs(name)}')">Leave Pkg ${n}</button>`
          : `<button class="btn-ghost btn-sm" onclick="doThrowHat('${esc(l._id)}','${esc(p.pkgId)}','${escJs(name)}')">Enter Pkg ${n}</button>`;
      }).join('')}
      <button class="btn-del" onclick="doRemoveExternalName('${esc(l._id)}','${escJs(name)}')">Remove</button>
    </div>
  </div>`;
}

// Targeted refresh for the open lottery view — preserves scroll and focus
function refreshLotteryOpenView(lotteryId) {
  const l=state.lotteries.find(x=>x._id===lotteryId);
  if(!l) return;
  const pkgs=(l.packages||[]).slice().sort((a,b)=>b.totalValue-a.totalValue);
  const extNames=l.externalNames||[];
  const u=state.user;

  // Update packages grid
  const pkgsEl=document.getElementById('lottery-open-pkgs');
  if(pkgsEl) pkgsEl.innerHTML=pkgs.map(pkg=>renderPackageCard(pkg,l,false)).join('');

  // Update external participants list
  const extEl=document.getElementById('lottery-ext-list');
  if(extEl) extEl.innerHTML=extNames.length?`
    <div style="margin-bottom:24px;">
      ${extNames.map(name=>renderExtNameRow(l,pkgs,name)).join('')}
    </div>`:`<div style="font-size:var(--text-md);color:var(--fg);padding:12px 0;">No external participants added.</div>`;

  // Update status bar entry count
  const totalEntries=pkgs.reduce((s,p)=>s+(p.interested||[]).length,0);
  const statusEl=document.getElementById('lottery-open-status');
  if(statusEl) statusEl.textContent=`${totalEntries} entr${totalEntries!==1?'ies':'y'} across ${pkgs.length} packages.`;
}

function renderLotteryDrawnDetail(l) {
  const pkgs=(l.packages||[]).slice().sort((a,b)=>b.totalValue-a.totalValue);
  const winnerCount=pkgs.filter(p=>p.winner).length;
  // Collect all participants who entered but didn't win
  const allParticipantIds=new Set();
  pkgs.forEach(p=>(p.interested||[]).forEach(i=>allParticipantIds.add(i.id)));
  const winnerIds=new Set(pkgs.filter(p=>p.winner).map(p=>p.winner.id));
  const noWinners=[];
  pkgs.forEach(p=>(p.interested||[]).forEach(i=>{
    if(!winnerIds.has(i.id)&&!noWinners.some(x=>x.id===i.id)) noWinners.push(i);
  }));

  return `
    <div style="margin-bottom:24px;padding:20px;background:var(--bg2);border-left:4px solid #22c55e;">
      <div style="font-size:var(--text-md);font-weight:700;">Draw complete. ${winnerCount} of ${pkgs.length} packages assigned.</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:40px;">
      ${pkgs.map(pkg=>renderPackageCard(pkg,l,true)).join('')}
    </div>
    ${noWinners.length?`
    <div style="margin-top:8px;padding:16px 20px;background:var(--bg2);border:1.5px solid var(--border-l);">
      <div style="font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;">No Package Assigned</div>
      ${noWinners.map(p=>`<div style="font-size:var(--text-md);padding:4px 0;">${esc(p.name)} — no package won</div>`).join('')}
    </div>`:''}`;
}

function renderLotteryClosedDetail(l) {
  const pkgs=(l.packages||[]).slice().sort((a,b)=>b.totalValue-a.totalValue);
  const winnerCount=pkgs.filter(p=>p.winner).length;

  return `
    <div style="margin-bottom:24px;padding:20px;background:var(--bg2);border-left:4px solid #555;">
      <div style="font-size:var(--text-md);font-weight:700;">Lottery closed. ${winnerCount} of ${pkgs.length} packages assigned.</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">
      ${pkgs.map(pkg=>renderPackageCard(pkg,l,true)).join('')}
    </div>`;
}

function renderPackageCard(pkg, lottery, readOnly) {
  const u=state.user; const admin=canManageLottery(u);
  const interested=pkg.interested||[];
  const iHaveHat=interested.some(i=>i.id===u._id);
  const isOpen=lottery.status==='open';
  const isDrawn=lottery.status==='drawn'||lottery.status==='closed';
  const winner=pkg.winner||null;
  const iWon=winner&&winner.id===u._id;
  let cardClass='pkg-card';
  if(iWon) cardClass+=' mine';
  else if(winner) cardClass+=' picked';

  return `<div class="${cardClass}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
      <div>
        <span style="font-size:var(--text-md);font-weight:900;">Package ${pkg.pkgId.replace('pkg_','')}</span>
        <span style="font-size:var(--text-md);margin-left:8px;font-weight:700;">${pkg.totalValue.toLocaleString()} pts</span>
      </div>
      ${isDrawn&&winner?`<span style="font-size:var(--text-md);font-weight:700;color:#22c55e;">${esc(winner.name)}</span>`:''}
      ${isDrawn&&!winner?`<span style="font-size:var(--text-md);color:var(--fg);opacity:.6;">Unassigned</span>`:''}
    </div>
    <div style="margin-bottom:10px;">
      ${pkg.items.map(item=>`
        <div class="pkg-item-row">
          <span class="comp-type-badge" style="font-size:var(--text-xs);">${esc(item.typeName)}</span>
          <span style="font-weight:700;flex:1;font-size:var(--text-md);" class="comp-grade-${item.grade.toLowerCase()}">${esc(item.name)}</span>
          <span style="font-size:var(--text-md);color:var(--fg);">S${item.size}<span class="tier-${item.tier.toLowerCase()}"> ${item.tier}</span></span>
          <span style="font-size:var(--text-md);color:var(--fg);">${item.value} pts</span>
        </div>`).join('')}
    </div>
    ${isOpen&&!readOnly?`
    <div style="margin-top:8px;">
      <div style="font-size:var(--text-md);margin-bottom:8px;color:var(--fg);">${interested.length} interested${interested.length?': '+interested.map(i=>esc(i.name)).join(', '):''}.</div>
      ${iHaveHat
        ?`<button class="btn btn-outline btn-sm" style="width:100%;justify-content:center;" onclick="doRemoveHat('${esc(lottery._id)}','${esc(pkg.pkgId)}','${u._id}')">Leave</button>`
        :`<button class="btn btn-black" style="width:100%;justify-content:center;" onclick="doThrowHat('${esc(lottery._id)}','${esc(pkg.pkgId)}')">Enter</button>`}
    </div>`:''}
    ${isDrawn&&interested.length?`
    <div style="margin-top:8px;font-size:var(--text-md);color:var(--fg);">
      ${interested.map(i=>{
        const won=winner&&winner.id===i.id;
        return `<span style="${won?'color:#22c55e;font-weight:700;':'opacity:.7;'}">${esc(i.name)}${won?' (winner)':''}</span>`;
      }).join(', ')}
    </div>`:''}
  </div>`;
}

function setLotCompType(lotteryId, t) {
  lotteryCompTypeFilter=t;
  // Reset sub-filters when type changes
  lotteryCompSizeFilter='all';
  lotteryCompGradeFilter='all';
  lotteryCompClassFilter='all';
  lotteryCompSearch='';
  // Re-render the right panel only by re-rendering the full detail page
  const pw=document.getElementById('page-wrap');
  if(pw) pw.innerHTML=`<div class="page">${pageLottery()}</div>`;
}
function setLotCompSize(lotteryId, s) {

}
function setLotCompGrade(lotteryId, g) {
  lotteryCompGradeFilter=g;
  const pw=document.getElementById('page-wrap');
  if(pw) pw.innerHTML=`<div class="page">${pageLottery()}</div>`;
}
function setLotCompClass(lotteryId, c) {

function backToLotteryList() {
  lotteryView='list'; lotteryDetailId=null; renderPage();
}

function openCreateLotteryModal() {
  showModal(`
    <div class="modal-title">New Lottery</div>
    <div class="field">
      <label class="lbl">Title</label>
      <input type="text" id="nl-title" placeholder="e.g. Weekly Component Drop" autofocus>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-black" onclick="confirmCreateLottery()">Create</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function confirmCreateLottery() {
  const title=(document.getElementById('nl-title')||{value:''}).value.trim();
  if(!title){toast('Enter a lottery title');return;}
  try {
    const id=await convexMutation('lotteries:create',{sessionToken:state.sessionToken,title});
    closeModal();
    toast('Lottery created');
    await refreshAll();
    lotteryDetailId=id;
    lotteryView='detail';
    renderPage();
  } catch(e){notifyError(e);}
}

async function addLotteryItem(lotteryId, itemId, name, type, typeName, grade, size, tier) {
  const comp={type,grade,size:parseInt(size),tier};
  const value=compDefaultValue(comp);
  const item={id:itemId+'_'+Date.now(),name,type,typeName,grade,size:parseInt(size),tier,value};
  try {
    await convexMutation('lotteries:addItem',{sessionToken:state.sessionToken,lotteryId,item});
    toast(`${name} added`);
    await refreshAll();
    // Re-render the detail page in place
    const pw=document.getElementById('page-wrap');
    if(pw) pw.innerHTML=`<div class="page">${pageLottery()}</div>`;
  } catch(e){notifyError(e);}
}

async function removeLotteryItem(lotteryId, itemId) {
  try {
    await convexMutation('lotteries:removeItem',{sessionToken:state.sessionToken,lotteryId,itemId});
    await refreshAll();
    const pw=document.getElementById('page-wrap');
    if(pw) pw.innerHTML=`<div class="page">${pageLottery()}</div>`;
  } catch(e){notifyError(e);}
}


async function doGeneratePackages(lotteryId) {
  const n=lotteryPkgCount;
  if(n<2||n>20){toast('Package count must be 2–20');return;}
  try {
    await convexMutation('lotteries:generatePackages',{sessionToken:state.sessionToken,lotteryId,packageCount:n});
    toast(`${n} packages generated`);
    await refreshAll();
    // Only update the packages preview section, preserving the pkg-count input
    const preview=document.getElementById('lottery-pkgs-preview');
    if(preview){
      const l=state.lotteries.find(x=>x._id===lotteryId);
      const pkgs=l?l.packages||[]:[];
      preview.innerHTML=pkgs.length?`
        <div style="font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border);">Generated Packages Preview</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
          ${pkgs.map(pkg=>renderPackageCard(pkg,l,true)).join('')}
        </div>`:'';
      // Update the "X packages generated" status line inside the generate box
      const genStatus=document.getElementById('lottery-gen-status');
      if(genStatus) genStatus.innerHTML=pkgs.length?`<div style="margin-top:10px;font-size:var(--text-md);color:#22c55e;font-weight:700;">${pkgs.length} packages generated</div>`:'';
    } else {
      const pw=document.getElementById('page-wrap');
      if(pw) pw.innerHTML=`<div class="page">${pageLottery()}</div>`;
    }
  } catch(e){notifyError(e);}
}

async function doBulkAddNames(lotteryId, rawText) {
  const text = rawText !== undefined ? rawText : (document.getElementById('ext-bulk-input')?.value || '');
  const names = text.split('\n').map(n => n.trim()).filter(n => n.length > 0);
  if(!names.length){ toast('No names found.'); return; }
  try {
    const added = await convexMutation('lotteries:bulkAddExternalNames', {sessionToken:state.sessionToken, lotteryId, names});
    const inp = document.getElementById('ext-bulk-input');
    if(inp) inp.value = '';
    await refreshAll();
    refreshLotteryOpenView(lotteryId);
    toast(`Added ${added} name${added!==1?'s':''}.`);
  } catch(e){ notifyError(e); }
}

async function doBulkAddFromFile(lotteryId, input) {
  const file = input.files?.[0];
  if(!file) return;
  const text = await file.text();
  input.value = '';
  await doBulkAddNames(lotteryId, text);
}

async function doEnterAllPackages(lotteryId, externalName) {
  const l=state.lotteries.find(x=>x._id===lotteryId);
  if(!l) return;
  const pkgs=(l.packages||[]);
  const notEntered=pkgs.filter(p=>!(p.interested||[]).some(i=>i.id==='ext_'+externalName));
  for(const p of notEntered){
    try {
      await convexMutation('lotteries:throwHat',{sessionToken:state.sessionToken,lotteryId,pkgId:p.pkgId,externalName});
    } catch(e){ /* skip if already entered */ }
  }
  await refreshAll();
  refreshLotteryOpenView(lotteryId);
}

async function doEnterAllNamesAllPackages(lotteryId) {
  const l=state.lotteries.find(x=>x._id===lotteryId);
  if(!l) return;
  const pkgs=(l.packages||[]);
  const extNames=(l.externalNames||[]);
  for(const name of extNames){
    const notEntered=pkgs.filter(p=>!(p.interested||[]).some(i=>i.id==='ext_'+name));
    for(const p of notEntered){
      try {
        await convexMutation('lotteries:throwHat',{sessionToken:state.sessionToken,lotteryId,pkgId:p.pkgId,externalName:name});
      } catch(e){ /* skip if already entered */ }
    }
  }
  await refreshAll();
  refreshLotteryOpenView(lotteryId);
}

async function claimBootstrapAdmin() {
  if(hasAdmin()) { toast('An admin already exists.'); renderNav(); return; }
  if(!await confirmModal(`Claim admin role for "${state.user.username}"? This is only possible while no admins exist.`)) return;
  try {
    const updated=await convexMutation('users:claimBootstrapAdmin',{sessionToken:state.sessionToken});
    state.user=updated;
    toast('Admin role claimed!');
    await refreshAll();
    goTo('admin');
  } catch(e){
    if(e.message.includes('ADMIN_EXISTS')) toast('An admin already exists — cannot claim.');
    else notifyError(e);
  }
}

async function init(){
  if(!CONVEX_URL){showSetup();return;}
  const token=localStorage.getItem('navytrack_token');
  if(token){
    try{
      const user=await convexQuery('sessions:whoami',{token});
      if(user){state.user=user;state.sessionToken=token;showApp();return;}
    }catch(e){/* fall through */}
  }
  localStorage.removeItem('navytrack_token');
  showAuth();
}
init();

/* ── PRIMARY NAV SCROLL BEHAVIOUR ───────────────────────────────────
   Primary nav (MAT/TASK/CRAFT/LOG):
     - Snaps to 10% sliver on scroll down past 40px
     - On scroll up: slides back in direct proportion to upward scroll
       distance — no easing, items move at exactly scroll speed.
       Fully back after RETURN_RANGE px of upscroll from wherever you are.
   Subnav:
     - Hides on scroll down past 40px
     - Only reappears when scrolled back near the top (scrollY < SUBNAV_THRESHOLD)
─────────────────────────────────────────────────────────────────── */
(function(){
  const TRANSLATE_CAP    = 0.9;   // hide 90%, always show bottom 10%
  const RETURN_RANGE     = 120;   // px of upscroll needed to fully return
  const SUBNAV_THRESHOLD = 60;    // px — subnav returns only when close to top

  let HEADER_H     = 0;
  let MAX_TRANSLATE = 0;
  let primaryHidden = false;
  let subnavHidden  = false;
  let returnAnchor  = null;  // scrollY when upscroll started
  let lastScrollY   = window.scrollY;

  function setup(updateMargin){
    const primary  = document.getElementById('nav-primary');
    const pageWrap = document.getElementById('page-wrap');
    const nav      = document.getElementById('nav');
    if(!primary || !pageWrap || !nav) return;

    primary.style.height = '';
    const item = primary.querySelector('.nav-main');
    HEADER_H      = item ? item.offsetHeight : 160;
    MAX_TRANSLATE = HEADER_H * TRANSLATE_CAP;
    primary.style.height = HEADER_H + 'px';

    if(updateMargin || !pageWrap.style.marginTop){
      pageWrap.style.marginTop = nav.offsetHeight + 'px';
    }
  }

  function setPrimaryTranslate(translateY, withTransition){
    const primary = document.getElementById('nav-primary');
    if(!primary) return;
    primary.querySelectorAll('.nav-main').forEach(el => {
      el.style.transition = withTransition ? 'transform 0.18s ease' : 'none';
      el.style.transform  = el.classList.contains('active')
        ? 'translate(0,0)'
        : `translate(0,-${translateY}px)`;
    });
  }

  function applySubnav(hide){
    if(subnavHidden === hide) return;
    subnavHidden = hide;
    const sub = document.getElementById('nav-sub');
    if(!sub) return;
    sub.style.transition    = 'opacity 0.18s ease';
    sub.style.opacity       = hide ? '0' : '1';
    sub.style.pointerEvents = hide ? 'none' : '';
  }

  let ticking = false;

  function update(){
    const scrollY   = window.scrollY;
    const goingDown = scrollY > lastScrollY;
    lastScrollY     = scrollY;

    // Primary nav
    if(!primaryHidden){
      if(goingDown && scrollY > 40){
        primaryHidden = true;
        returnAnchor  = null;
        setPrimaryTranslate(MAX_TRANSLATE, true); // snap hidden
      }
    } else {
      if(goingDown){
        // Scrolled back down while returning — reset anchor, snap hidden
        returnAnchor = null;
        setPrimaryTranslate(MAX_TRANSLATE, true);
      } else {
        // Scrolling up — track distance from where upscroll started
        if(returnAnchor === null) returnAnchor = scrollY;
        const upScrolled = returnAnchor - scrollY;
        const progress   = Math.min(1, upScrolled / RETURN_RANGE);
        setPrimaryTranslate((1 - progress) * MAX_TRANSLATE, false);
        if(progress >= 1){ primaryHidden = false; returnAnchor = null; }
      }
    }

    // Subnav: hide going down, only return when close to top
    if(goingDown && scrollY > 40)       applySubnav(true);
    else if(scrollY < SUBNAV_THRESHOLD) applySubnav(false);

    ticking = false;
  }

  window.addEventListener('scroll', () => {
    if(!ticking){ requestAnimationFrame(update); ticking = true; }
  }, { passive: true });

  window.addEventListener('resize', () => { setup(true); }, { passive: true });

  window._navScrollUpdate = function(){
    setup(false);
    // Re-apply current states without transition after re-render
    const upScrolled = (returnAnchor !== null) ? (returnAnchor - window.scrollY) : 0;
    const progress   = primaryHidden ? Math.min(1, upScrolled / RETURN_RANGE) : 1;
    setPrimaryTranslate(primaryHidden ? (1 - progress) * MAX_TRANSLATE : 0, false);
    const sub = document.getElementById('nav-sub');
    if(sub){
      sub.style.transition    = 'none';
      sub.style.opacity       = subnavHidden ? '0' : '1';
      sub.style.pointerEvents = subnavHidden ? 'none' : '';
    }
  };
})();
</script>
