<!DOCTYPE html>
<html lang="en">
<!-- v2 -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVYTRACK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#cc0000;--mid:#888;--fg:#000;--bg:#fff;--bg2:#f5f5f5;--border:#000;--border-l:#e0e0e0;--border-m:#e8e8e8;}
/* Type scale (P3-2). Base components reference these; mobile @media steps stay literal px. */
:root{--text-xs:13px;--text-sm:15px;--text-md:18px;--text-lg:24px;--text-xl:38px;--text-2xl:52px;}
/* Spacing scale (P3-2). Applied to structural layout spacing; micro insets stay literal. */
:root{--space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;--space-7:48px;--space-8:60px;}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fff;color:#000;font-size:var(--text-md);line-height:1.5;}

/* ── NAV WRAPPER ─────────────────────────────────────────────────── */
/* transparent so only letter slivers show when items translate up   */
#nav{position:fixed;top:0;left:0;right:0;z-index:100;background:transparent;}

/* ── NAV TOPBAR (user info) ──────────────────────────────────────── */
#nav-topbar{display:flex;align-items:center;justify-content:flex-end;padding:7px 40px;gap:var(--space-3);font-size:var(--text-md);border-bottom:1px solid #e0e0e0;background:#fff;}

/* ── PRIMARY NAV ─────────────────────────────────────────────────── */
/* overflow:hidden clips items as they translate up (OMA mechanic)   */
#nav-primary{display:flex;justify-content:space-between;align-items:flex-end;padding:10px 40px 0;overflow:hidden;}
.nav-main{font-size:clamp(40px,8vw,220px);font-weight:900;letter-spacing:-0.03em;line-height:1;padding-bottom:10px;cursor:pointer;color:#000;text-transform:uppercase;user-select:none;will-change:transform;}
.nav-main.outline{-webkit-text-stroke:2px #000;color:transparent;}

/* ── SUB NAV ─────────────────────────────────────────────────────── */
#nav-sub{display:flex;align-items:baseline;padding:4px 40px 0;gap:0;}
.nav-sub-item{font-size:clamp(24px,3vw,46px);font-weight:900;letter-spacing:-.5px;text-transform:uppercase;cursor:pointer;color:#000;border-bottom:3px solid transparent;padding-bottom:4px;margin-right:52px;user-select:none;transition:opacity .15s;}
.nav-sub-item:last-child{margin-right:0;}
.nav-sub-item.active{border-bottom:3px solid #000;}
.nav-divider{border:none;border-top:2px solid #000;margin:0;}

/* ── ROLE & STATUS TAGS ──────────────────────────────────────────── */
.role-tag{font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border:1px solid #000;}
.role-tag.recruit{border-color:#bbb;color:#999;}
.role-tag.member{border-color:#60a5fa;color:#2563eb;}
.role-tag.core{border-color:#f59e0b;color:#d97706;}
.role-tag.command{border-color:var(--red);color:var(--red);}
.role-tag.admin{background:#000;color:#fff;}
.role-tag.removed{border-color:#fca5a5;color:#ef4444;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.live-dot{animation:pulse 2s infinite;}

/* ── PAGE LAYOUT ─────────────────────────────────────────────────── */
.page{padding:var(--space-8) 40px 140px;}
.page-title{font-size:var(--text-xl);font-weight:900;letter-spacing:-.5px;line-height:1;margin-bottom:10px;}
.page-sub{font-size:var(--text-md);color:#000;margin-bottom:52px;margin-top:4px;}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--space-8);padding-bottom:0;}
.page-head-left{flex:1;}
hr.thick{border:none;border-top:2px solid #000;margin:var(--space-8) 0;}
hr.thin{border:none;border-top:1px solid #e0e0e0;margin:0;}
hr.red{border:none;border-top:1px solid var(--red);margin:var(--space-8) 0;}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:var(--text-md);font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:9px 18px;}
.btn-black{background:#000;color:#fff;}
.btn-black:hover{background:#222;}
.btn-outline{background:#fff;color:#000;border:1.5px solid #000;}
.btn-outline:hover{background:#f0f0f0;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover{background:#a00;}
.btn-sm{padding:5px 11px;font-size:var(--text-md);}
.btn-ghost{background:none;color:#000;border:1px solid #ccc;padding:5px 11px;font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.btn-ghost:hover{border-color:#000;color:#000;}
.btn-ghost.active{background:#000;color:#fff;border-color:#000;}
.btn-max{background:#000;color:#fff;padding:0 var(--space-4);font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:1.5px solid #000;white-space:nowrap;}
.btn-max:hover{background:#333;}

/* ── FORMS ───────────────────────────────────────────────────────── */
label.lbl{display:block;font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;color:#000;}
input[type=text],input[type=password],input[type=number],select{
  display:block;width:100%;border:1.5px solid #000;padding:9px var(--space-3);font-size:var(--text-md);font-family:inherit;background:#fff;appearance:none;-webkit-appearance:none;outline:none;}
/* Universal square corners on form controls (iOS rounds textareas & buttons by default) */
input,select,textarea,button{border-radius:0;}
textarea{appearance:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--red);}
input::placeholder,textarea::placeholder{color:#000;}
.field{margin-bottom:28px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-6);}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-5);}
.panel{border:1.5px solid #000;padding:40px;}
.collapsible{display:none;}
.collapsible.open{display:block;}

/* ── TABLES ──────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;}
thead th{font-size:var(--text-md);font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:var(--space-4) 14px;border-bottom:2px solid #000;text-align:left;white-space:nowrap;color:#000;}
tbody td{padding:20px 14px;vertical-align:middle;font-size:var(--text-md);}
tbody tr:hover{background:#f9f9f9;}
.empty{padding:120px 0;text-align:center;color:#000;font-size:var(--text-md);letter-spacing:.04em;}

/* ── TAGS ────────────────────────────────────────────────────────── */
.q{display:inline-block;padding:2px 7px;font-size:var(--text-md);font-weight:700;background:#000;color:#fff;}
.unit-tag{display:inline-block;padding:1px 5px;font-size:var(--text-md);font-weight:700;letter-spacing:.06em;color:#000;margin-left:4px;}
.cat-tag{display:inline-block;padding:1px 5px;font-size:var(--text-md);font-weight:700;letter-spacing:.06em;background:#f0f0f0;color:#000;}
.item-cat-tag{display:inline-block;padding:2px var(--space-2);font-size:var(--text-md);font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#000;color:#fff;}
.craft-box{border:2px solid #000;padding:36px;margin-bottom:var(--space-7);}
.craft-box.err{border-color:var(--red);}
.q-big{font-size:var(--text-2xl);font-weight:900;letter-spacing:-2px;line-height:1;}

/* ── LOG BADGES ──────────────────────────────────────────────────── */
.badge{display:inline-block;font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:0;background:none;color:#000;}
.badge-user_joined,.badge-member_removed,.badge-role_approved,.badge-role_denied,
.badge-admin_granted,.badge-task_created,.badge-task_closed,.badge-item_added,
.badge-item_updated,.badge-item_removed{background:none;color:#000;}

/* ── ITEMS ───────────────────────────────────────────────────────── */
.item-cat-tag{font-size:var(--text-sm);font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border:1px solid #000;white-space:nowrap;}


/* ── TASKS ───────────────────────────────────────────────────────── */
.task-list{border-top:2px solid #000;}
.task-card{padding:var(--space-6) 0;margin-bottom:0;position:relative;padding-left:20px;}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.task-card.urgent::before{background:var(--red);}
.task-card.high::before{background:#f97316;}
.task-card.normal::before{background:#3b82f6;}
.task-card.whenever::before{background:#d1d5db;}
.task-card:hover{background:#fafafa;}
.task-card.completed{opacity:.5;}
.task-card.cancelled{opacity:.35;}
.task-card-title{font-size:var(--text-lg);font-weight:900;letter-spacing:-.3px;line-height:1.2;margin-bottom:var(--space-3);}
.p-badge{display:inline-block;padding:2px 7px;font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-right:6px;}
.p-urgent{background:var(--red);color:#fff;}
.p-high{background:#f97316;color:#fff;}
.p-normal{background:#3b82f6;color:#fff;}
.p-whenever{background:#e5e7eb;color:#555;}
.role-badge{display:inline-block;padding:1px 6px;font-size:var(--text-md);font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid #000;margin-right:3px;}
.rb-recruit{border-color:#bbb;color:#888;}
.rb-member{border-color:#60a5fa;color:#2563eb;}
.rb-core{border-color:#f59e0b;color:#d97706;}
.rb-command{border-color:var(--red);color:var(--red);}
.rb-admin{background:#000;color:#fff;}
.task-search-bar{padding:0 0 36px;margin-bottom:0;}

/* ── MISC CONTROLS ───────────────────────────────────────────────── */
.btn-del{background:none;border:1px solid #fca5a5;color:var(--red);padding:4px 10px;font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
.btn-del:hover{background:var(--red);color:#fff;border-color:var(--red);}
.pending-note{background:#fffbeb;padding:10px 14px;font-size:var(--text-md);color:#000;margin-top:10px;line-height:1.6;display:none;}

/* ── AUTH ────────────────────────────────────────────────────────── */
.center-screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;}
.auth-box{width:100%;max-width:400px;}
.auth-logo{font-size:clamp(44px,8vw,100px);font-weight:900;letter-spacing:-4px;text-align:center;margin-bottom:72px;}
.tabs{display:flex;border-bottom:2px solid #000;margin-bottom:40px;}
.tab-btn{flex:1;padding:var(--space-3);font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-align:center;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;color:#000;}
.tab-btn.active{border-bottom-color:#000;color:#000;}
.err-msg{font-size:var(--text-md);color:var(--red);margin-bottom:var(--space-3);display:none;}
.chk-row{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-2);cursor:pointer;}
.chk-row input{width:auto;flex-shrink:0;}
.chk-row span{font-size:var(--text-md);}
.setup-note{font-size:var(--text-md);color:#000;margin-top:var(--space-4);line-height:1.7;}
.code-block{background:#f5f5f5;padding:var(--space-2) var(--space-3);font-family:monospace;font-size:var(--text-md);margin:var(--space-2) 0;}

/* ── TOAST / MODAL ───────────────────────────────────────────────── */
#toast{position:fixed;bottom:28px;right:28px;background:#000;color:#fff;padding:var(--space-3) 20px;font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;display:none;z-index:999;}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:var(--space-5);}
#modal-overlay.open{display:flex;}
.modal-box{background:#fff;padding:36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-size:var(--text-lg);font-weight:900;letter-spacing:-.5px;margin-bottom:40px;}
.search-row{display:flex;gap:var(--space-3);align-items:center;margin-bottom:36px;}
.search-row input{max-width:260px;margin:0;}

/* ── INLINE UTILS ────────────────────────────────────────────────── */
.unit-inline{font-size:var(--text-md);font-weight:700;color:#000;margin-left:4px;}
.loc-display{font-size:var(--text-md);color:#000;}
.sys-badge{font-size:var(--text-md);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:#333;padding:1px 5px;margin-right:4px;}
.sys-badge.pyro{background:var(--red);}
.sys-badge.nyx{background:#005080;}

/* ── FILTER TABS (inline content) ────────────────────────────────── */
.filter-tabs{display:flex;gap:var(--space-7);flex-wrap:wrap;margin-bottom:52px;padding-bottom:20px;}
.filter-tab{padding:0;font-size:var(--text-md);font-weight:700;border:none;background:none;color:#000;cursor:pointer;letter-spacing:-.1px;}
.filter-tab.active{color:#000;border-bottom:2px solid #000;padding-bottom:2px;}
.filter-tab:hover:not(.active){color:#000;}

/* ── PAGE SUB-TABS (now in nav — keep for compat, invisible) ─────── */
.sub-tabs{display:none;}
.sub-tab{display:none;}

/* ── HINT BOX ────────────────────────────────────────────────────── */
.hint-box{background:#f5f5f5;border-left:3px solid #000;padding:var(--space-4) 20px;font-size:var(--text-md);color:#000;margin-top:var(--space-4);line-height:1.8;}
.hint-box strong{color:#000;}

/* ── OVERVIEW / LANDING ──────────────────────────────────────────── */
.ov-wrap{}
.ov-header{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:28px;border-bottom:2px solid #000;}
.ov-title{display:none;}
.ov-greeting{font-size:clamp(22px,3vw,34px);font-weight:900;letter-spacing:-.5px;line-height:1;}
.ov-greeting-sub{font-size:var(--text-md);color:#000;margin-top:6px;font-weight:400;}
.ov-date{font-size:var(--text-md);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#000;text-align:right;line-height:1.9;}
.ov-stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid #000;}
.ov-stat{padding:40px 0;}
.ov-stat-num{font-size:clamp(42px,6vw,66px);font-weight:900;letter-spacing:-3px;line-height:1;margin-bottom:10px;}
.ov-stat-num.red{color:var(--red);}
.ov-stat-label{font-size:var(--text-md);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#000;}
.ov-stat-sub{font-size:var(--text-md);color:#000;margin-top:5px;letter-spacing:.04em;}
.ov-body{display:grid;grid-template-columns:3fr 2fr;gap:0;border-bottom:2px solid #000;}
.ov-col{padding:40px 0;}
.ov-col+.ov-col{padding-left:var(--space-8);}
.ov-col-head{font-size:var(--text-xl);font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:var(--space-5);padding-bottom:14px;border-bottom:1px solid #000;}
.ov-entry{display:grid;grid-template-columns:60px 100px 1fr auto;gap:var(--space-2) 28px;padding:14px 0;align-items:baseline;}
.ov-entry-date{font-size:var(--text-md);color:#000;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.ov-entry-action{font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#000;white-space:nowrap;}
.ov-entry-body{font-size:var(--text-md);line-height:1.6;}
.ov-entry-who{font-size:var(--text-md);color:#000;font-weight:700;letter-spacing:.04em;white-space:nowrap;}
.ov-task-row{padding:var(--space-4) 0;}
.ov-task-title{font-size:var(--text-md);font-weight:600;margin-bottom:5px;}
.ov-task-meta{font-size:var(--text-md);color:#000;}
.ov-bottom{display:grid;grid-template-columns:3fr 2fr;gap:0;padding-top:var(--space-6);}
.ov-empty{color:#000;font-size:var(--text-md);padding:var(--space-5) 0;}

/* ── DARK MODE ───────────────────────────────────────────────────── */
body.dark{background:#111;color:#e0e0e0;--fg:#e0e0e0;--bg:#111;--bg2:#1a1a1a;--border:#e0e0e0;--border-l:#333;--border-m:#2a2a2a;}
body.dark #nav-topbar{background:#111;border-bottom-color:#333;}
body.dark .nav-main{color:#e0e0e0;}
body.dark .nav-main.outline{-webkit-text-stroke:2px #e0e0e0;color:transparent;}
body.dark .nav-sub-item{color:#e0e0e0;}
body.dark .nav-sub-item.active{border-bottom-color:#e0e0e0;}
body.dark .nav-divider{border-top-color:#e0e0e0;}
body.dark hr.thick{border-top-color:#e0e0e0;}
body.dark hr.thin{border-top-color:#333;}
body.dark hr.red{border-top-color:var(--red);}
body.dark .page-sub{color:#e0e0e0;}
body.dark input[type=text],body.dark input[type=password],body.dark input[type=number],body.dark select{background:#1a1a1a;border-color:#e0e0e0;color:#e0e0e0;}
body.dark input::placeholder{color:#888;}
body.dark .panel{border-color:#e0e0e0;}
body.dark .btn-black{background:#e0e0e0;color:#111;}
body.dark .btn-black:hover{background:#ccc;}
body.dark .btn-outline{background:#111;color:#e0e0e0;border-color:#e0e0e0;}
body.dark .btn-outline:hover{background:#222;}
body.dark .btn-ghost{background:none;color:#e0e0e0;border-color:#555;}
body.dark .btn-ghost:hover{border-color:#e0e0e0;color:#e0e0e0;}
body.dark .btn-ghost.active{background:#e0e0e0;color:#111;border-color:#e0e0e0;}
body.dark .btn-max{background:#e0e0e0;color:#111;border-color:#e0e0e0;}
body.dark .btn-max:hover{background:#ccc;}
body.dark .btn-del{border-color:#7f1d1d;color:var(--red);}
body.dark .btn-del:hover{background:var(--red);color:#fff;}
body.dark label.lbl{color:#e0e0e0;}
body.dark thead th{border-bottom-color:#e0e0e0;color:#e0e0e0;}
body.dark tbody tr:hover{background:#1a1a1a;}
body.dark .empty{color:#e0e0e0;}
body.dark .q{background:#e0e0e0;color:#111;}
body.dark .cat-tag{background:#222;color:#e0e0e0;}
body.dark .item-cat-tag{background:#e0e0e0;color:#111;}
body.dark .craft-box{border-color:#e0e0e0;}
body.dark .task-list{border-top-color:#e0e0e0;}
body.dark .task-card:hover{background:#1a1a1a;}
body.dark .task-card.whenever::before{background:#444;}
body.dark .p-whenever{background:#333;color:#aaa;}
body.dark .role-badge{border-color:#e0e0e0;}
body.dark .rb-admin{background:#e0e0e0;color:#111;}
body.dark .role-tag{border-color:#e0e0e0;color:#e0e0e0;}
body.dark .role-tag.admin{background:#e0e0e0;color:#111;}
body.dark .badge{color:#e0e0e0;}
body.dark .badge-user_joined,.dark .badge-member_removed,.dark .badge-role_approved,.dark .badge-role_denied,.dark .badge-admin_granted,.dark .badge-task_created,.dark .badge-task_closed,.dark .badge-item_added,.dark .badge-item_updated,.dark .badge-item_removed{color:#e0e0e0;}
body.dark .ov-col-head{border-bottom-color:#333;}
body.dark .ov-header{border-bottom-color:#333;}
body.dark .ov-stats{border-bottom-color:#333;}
body.dark .ov-body{border-bottom-color:#333;}
body.dark .ov-col+.ov-col{}
body.dark .modal-box{background:#111;}
body.dark #toast{background:#e0e0e0;color:#111;}
body.dark .tabs{border-bottom-color:#e0e0e0;}
body.dark .tab-btn{color:#e0e0e0;}
body.dark .tab-btn.active{border-bottom-color:#e0e0e0;color:#e0e0e0;}
body.dark .filter-tab{color:#e0e0e0;}
body.dark .filter-tab.active{border-bottom-color:#e0e0e0;color:#e0e0e0;}
body.dark .hint-box{background:#1a1a1a;border-left-color:#e0e0e0;}
body.dark .code-block{background:#1a1a1a;}
body.dark .pending-note{background:#1a1a12;color:#e0e0e0;}
body.dark .sys-badge{background:#444;color:#e0e0e0;}
body.dark .sys-badge.pyro{background:var(--red);}
body.dark .sys-badge.nyx{background:#004a6e;}
body.dark .log-month-arrow{color:#e0e0e0;}
body.dark details.log-month>summary{border-bottom-color:#333;}
body.dark .unit-tag{color:#e0e0e0;}
body.dark .loc-display{color:#e0e0e0;}
body.dark .ov-date{color:#e0e0e0;}
body.dark .ov-stat-label{color:#e0e0e0;}
body.dark .ov-task-meta{color:#e0e0e0;}
body.dark .ov-empty{color:#e0e0e0;}
body.dark .ov-entry-date{color:#e0e0e0;}
body.dark .ov-entry-who{color:#e0e0e0;}
body.dark .ov-greeting-sub{color:#e0e0e0;}

/* ── LOTTERY ─────────────────────────────────────────────────────── */
.lottery-card{border:1.5px solid var(--border);padding:28px;margin-bottom:20px;position:relative;}
.lottery-status{display:inline-block;padding:2px var(--space-2);font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-left:var(--space-3);}
.lottery-status.draft{background:#f0f0f0;color:#555;}
.lottery-status.open{background:#22c55e;color:#fff;}
.lottery-status.drawn{background:#f59e0b;color:#fff;}
.lottery-status.closed{background:#555;color:#fff;}
body.dark .lottery-status.draft{background:#2a2a2a;color:#aaa;}
.pkg-card{border:1.5px solid var(--border-l);padding:20px;margin-bottom:var(--space-3);}
.pkg-card.picked{border-color:#22c55e;opacity:.8;}
.pkg-card.mine{border-color:#22c55e;background:#f0fdf4;}
body.dark .pkg-card.mine{background:#052e16;}
.pkg-item-row{display:flex;align-items:baseline;gap:10px;padding:5px 0;border-bottom:1px solid var(--border-m);}
.pkg-item-row:last-child{border-bottom:none;}
.comp-type-badge{display:inline-block;padding:1px 6px;font-size:var(--text-md);font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:#000;color:#fff;}
body.dark .comp-type-badge{background:#e0e0e0;color:#111;}
.comp-grade-mil{color:#cc0000;}
.comp-grade-sth{color:#7c3aed;}
.comp-grade-cmp{color:#0ea5e9;}
.comp-grade-civ{color:var(--fg);}
.comp-grade-ind{color:#888;}
.tier-a{font-weight:900;color:#eab308;}
.tier-b{font-weight:700;color:var(--fg);}
.tier-c{color:#888;}
.tier-d{color:#aaa;}

/* ── ARCHIVE MONTH GROUPS ────────────────────────────────────────── */
details.log-month{}
details.log-month>summary{display:flex;align-items:center;gap:14px;padding:28px 0;cursor:pointer;user-select:none;list-style:none;}
details.log-month>summary::-webkit-details-marker{display:none;}
details.log-month>summary::marker{display:none;}
/* ── ACCESSIBILITY ───────────────────────────────────────────────── */
:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
button:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--red);outline-offset:2px;}
/* Text fields use the red border as their focus cue — no extra outline ring */
input[type=text]:focus-visible,input[type=password]:focus-visible,input[type=number]:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;border-color:var(--red);}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}

/* CSS-drawn caret (no glyph/emoji) */
.caret{display:inline-block;width:0;height:0;border-left:7px solid currentColor;border-top:5px solid transparent;border-bottom:5px solid transparent;transition:transform .15s;vertical-align:middle;}
.caret.open{transform:rotate(90deg);}
.log-month-arrow{width:0;height:0;border-left:7px solid currentColor;border-top:5px solid transparent;border-bottom:5px solid transparent;color:#000;transition:transform .15s;display:inline-block;flex-shrink:0;}
details.log-month[open] .log-month-arrow{transform:rotate(90deg);}
.log-month-name{font-size:var(--text-lg);font-weight:900;letter-spacing:-.3px;}
.log-month-count{font-size:var(--text-md);color:#000;margin-left:auto;font-weight:700;letter-spacing:.06em;}
details.log-month>div{padding-bottom:var(--space-7);}

/* ── RESPONSIVE (tablet / phone) ─────────────────────────────────── */
@media (max-width:768px){
  /* Tighter horizontal padding everywhere */
  #nav-topbar{padding:7px var(--space-4);}
  #nav-primary{padding:var(--space-2) var(--space-4) 0;}
  #nav-sub{padding:4px var(--space-4) 0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  #nav-sub::-webkit-scrollbar{display:none;}
  .page{padding:var(--space-6) var(--space-4) 100px;}

  /* Nav scales down so 4 words + sub-tabs fit a phone */
  .nav-main{font-size:clamp(22px,7vw,52px);}
  .nav-sub-item{font-size:clamp(18px,5vw,30px);margin-right:26px;white-space:nowrap;}

  /* Page header can wrap its action button */
  .page-head{flex-wrap:wrap;gap:var(--space-4);margin-bottom:36px;}
  .page-title{font-size:30px;}
  .page-sub{margin-bottom:36px;}

  /* Stack multi-column layouts */
  .grid2,.grid3{grid-template-columns:1fr;gap:20px;}
  .ov-stats{grid-template-columns:1fr 1fr;}
  .ov-body,.ov-bottom{grid-template-columns:1fr;}
  .ov-col+.ov-col{padding-left:0;}
  .ov-col-head{font-size:26px;}
  .ov-stat{padding:var(--space-5) 0;}

  /* Non-card tables scroll horizontally instead of overflowing the page */
  table:not(.cards){display:block;width:max-content;max-width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  thead th{padding:var(--space-3) 10px;font-size:14px;}
  tbody td{padding:14px 10px;font-size:var(--text-sm);}
  /* Card tables (inventory, log): each row becomes a stacked card with field labels */
  table.cards,table.cards tbody,table.cards tr,table.cards td{display:block;width:100%;}
  table.cards thead{display:none;}
  table.cards tr{border:1px solid var(--border);padding:14px var(--space-4);margin-bottom:14px;}
  table.cards tr:hover{background:none;}
  table.cards td{padding:6px 0;border:none;font-size:16px;}
  table.cards td::before{content:attr(data-label);display:block;font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:.07em;color:var(--fg);margin-bottom:3px;}
  table.cards td[data-label=""]::before{display:none;}
  table.cards td[data-label=""]{margin-top:var(--space-2);}

  /* Modals go near-full-width with comfortable padding */
  #modal-overlay{padding:var(--space-3);}
  .modal-box{padding:var(--space-5) 18px;max-width:100%;}
  .modal-title{margin-bottom:var(--space-5);font-size:22px;}

  .panel{padding:var(--space-5);}
  .craft-box{padding:var(--space-5);}
  .center-screen{padding:20px;}
  .filter-tabs{gap:28px;margin-bottom:36px;}
  #toast{left:16px;right:16px;bottom:16px;text-align:center;}
}
@media (max-width:480px){
  .ov-stats{grid-template-columns:1fr;}
  .nav-sub-item{margin-right:20px;}
  .field{margin-bottom:20px;}
  .page-title{font-size:26px;}
  .task-card{padding:var(--space-5) 0;padding-left:var(--space-4);}
  .task-card-title{font-size:21px;}
}
</style>

<script type="module">

      import("https://esm.sh/convex@1.39.1/browser"),
      import("https://esm.sh/convex@1.39.1/server"),
    ]);
    window.__convex = { ConvexClient, anyApi };
  } catch (e) {
    console.warn("Convex reactive client failed to load; will use polling.", e);
  } finally {
    window.dispatchEvent(new Event("convex-ready"));
  }
</script>

const COMP_TYPE_MAP = {
  COOL:'Cooler', POWR:'Power Plant', QDRV:'Quantum Drive', QRDV:'Quantum Drive',
  QDMP:'Quantum Dampener', LIFE:'Life Support', COMP:'Computer',
  SHLD:'Shield', RADR:'Radar', JUMP:'Jump Drive', SECO:'Ship Computer', QED:'QED'
};
const COMP_GRADE_MAP = {
  Mil:'Military', Civ:'Civilian', Ind:'Industrial', Cmp:'Competition', Sth:'Stealth'
};

const LOTTERY_TYPES = ['COOL','POWR','QDRV','SHLD'];

function parseComponentsCatalog() {
  const TYPE_MAP = { cooler:'COOL', power:'POWR', quantum:'QDRV', shield:'SHLD' };
  const seen = new Set();
  const out = [];
  for (const c of COMPONENTS_JSON) {
    const type = TYPE_MAP[c.category];
    if (!type) continue;
    if (!LOTTERY_TYPES.includes(type)) continue;
    if (c.size < 0 || c.size > 3) continue;
    if (!['A','B','C'].includes(c.grade)) continue;
    const dk = `${type}|${c.name}|${c.field}|${c.size}|${c.grade}`;
    if (seen.has(dk)) continue;
    seen.add(dk);
    out.push({ name: c.name, type, typeName: COMP_TYPE_MAP[type]||type, grade: c.field, gradeName: COMP_GRADE_MAP[c.field]||c.field, size: c.size, tier: c.grade });
  }
  return out.sort((a,b) => {
    if(a.typeName!==b.typeName) return a.typeName.localeCompare(b.typeName);
    if(a.size!==b.size) return a.size-b.size;
    if(a.tier!==b.tier) return a.tier.localeCompare(b.tier);
    return a.name.localeCompare(b.name);
  });
}
const COMPONENTS_CATALOG = parseComponentsCatalog();

// Value = base(type) + size + tier + class multipliers
function compDefaultValue(comp) {
  const base      = {COOL:10, POWR:15, QDRV:18, SHLD:15}[comp.type] || 10;
  const sizeMult  = {0:8, 1:10, 2:15, 3:20}[comp.size] ?? 8;
  const tierMult  = {A:25, B:15, C:10}[comp.tier] || 10;
  const classMult = {Mil:20, Sth:15, Civ:10, Ind:10, Cmp:10}[comp.grade] || 10;
  return base + sizeMult + tierMult + classMult;
}

// ─── CONVEX HTTP HELPERS ──────────────────────────────────────────────────────
// Detect a session error from a string, Error, or ConvexError-like object.
function isSessionError(e) {
  const msg = typeof e === 'string' ? e : (e && (e.message || ''));
  const data = e && e.data;
  return (typeof data === 'string' && (data === 'SESSION_INVALID' || data === 'SESSION_EXPIRED')) ||
         (!!msg && (msg.includes('SESSION_INVALID') || msg.includes('SESSION_EXPIRED')));
}

// Central handler: any session error anywhere logs the user out cleanly to sign-in.
function handleSessionError(e) {
  if (!isSessionError(e)) return false;
  if (!state.sessionToken) return true; // already logged out — avoid repeat toasts/redirects
  stopData();
  state.user = null; state.sessionToken = null;
  localStorage.removeItem('navytrack_token');
  showAuth();
  toast('Session expired — please sign in again');
  return true;
}

// Turn a raw error into user-facing text (never an internal code / request id).
function friendlyError(e) {
  const msg = typeof e === 'string' ? e : (e && (e.message || ''));
  if (!msg) return 'Something went wrong. Please try again.';
  if (isSessionError(msg)) return 'Session expired — please sign in again';
  if (/Request ID:.*Server Error/i.test(msg)) return 'Something went wrong. Please try again.';
  return msg; // ConvexError messages are already user-friendly
}

// Show an error to the user (toast). Session errors are handled centrally and skipped here.
function notifyError(e) {
  if (e && e.__sessionHandled) return;
  if (handleSessionError(e)) return;
  toast(friendlyError(e));
}

async function convexQuery(path, args = {}) {
  const r = await fetch(`${CONVEX_URL}/api/query`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path, args, format:'json' }),
  });
  const d = await r.json();
  if (d.status !== 'success') {
    const msg = (typeof d.errorData === 'string' ? d.errorData : null) || d.errorMessage || 'Query failed';
    if (handleSessionError(msg)) { const err = new Error(msg); err.__sessionHandled = true; throw err; }
    throw new Error(msg);
  }
  return d.value;
}

async function convexMutation(path, args = {}) {
  const r = await fetch(`${CONVEX_URL}/api/mutation`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path, args, format:'json' }),
  });
  const d = await r.json();
  if (d.status !== 'success') {
    const msg = (typeof d.errorData === 'string' ? d.errorData : null) || d.errorMessage || 'Server error';
    if (handleSessionError(msg)) { const err = new Error(msg); err.__sessionHandled = true; throw err; }
    throw new Error(msg);
  }
  return d.value;
}

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
// Escape a value for safe use inside a SINGLE-quoted JS string that itself sits inside a
// DOUBLE-quoted HTML attribute (e.g. onclick="fn('${escJs(x)}')"). Neutralises both the JS
// string delimiter (') and the HTML attribute delimiter (") so user text cannot break out.
const escJs = s => String(s==null?'':s)
  .replace(/\\/g,'\\\\')
  .replace(/'/g,"\\'")
  .replace(/\r/g,'\\r')
  .replace(/\n/g,'\\n')
  .replace(/\u2028/g,'\\u2028')
  .replace(/\u2029/g,'\\u2029')
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

async function refreshAll(silent=false) {
  try {
    const tok = state.sessionToken;
    const [navItems, archive, allUsers, tasks, lotteries, applications, logistics, passwordResets] = await Promise.all([
      convexQuery('items:getAll',{sessionToken:tok}).catch(()=>[]),
      convexQuery('archive:getAll',{sessionToken:tok}).catch(()=>[]),
      convexQuery('users:getAllUsers',{sessionToken:tok}).catch(()=>[]),
      convexQuery('tasks:getAll',{sessionToken:tok}).catch(()=>[]),
      convexQuery('lotteries:getAll',{sessionToken:tok}).catch(()=>[]),
      convexQuery('applications:getAll',{sessionToken:tok}).catch(()=>[]),
      convexQuery('logistics:getAll',{sessionToken:tok}).catch(()=>[]),
      convexQuery('passwordResets:list',{sessionToken:tok}).catch(()=>[]),
    ]);
    state.navItems      = navItems      || [];
    state.archive       = archive       || [];
    state.allUsers      = allUsers      || [];
    state.tasks         = tasks         || [];
    state.lotteries     = lotteries     || [];
    state.applications  = applications  || [];
    state.logistics     = logistics     || [];
    state.passwordResets = passwordResets || [];
    // Sync logged-in user's roles from server
    if(state.user) {
      const fresh=state.allUsers.find(u=>u._id===state.user._id);
      if(fresh) state.user=fresh;
    }
    updateLiveView(silent);
  } catch(e) { if(!silent) console.warn('Refresh:', e.message); }
}
// ─── REAL-TIME DATA (Convex reactive subscriptions, with polling fallback) ──────
let convexClient = null;
let convexSubs = [];

// Tables to subscribe to, mapped to their state keys.
const REALTIME_TABLES = [
  ['items',        'getAll', 'navItems'],
  ['archive',      'getAll', 'archive'],
  ['users',        'getAllUsers', 'allUsers'],
  ['tasks',        'getAll', 'tasks'],
  ['lotteries',    'getAll', 'lotteries'],
  ['applications', 'getAll', 'applications'],
  ['logistics',    'getAll', 'logistics'],
  ['passwordResets', 'list', 'passwordResets'],
];

function startData() {
  refreshAll(); // immediate one-shot load so the UI is never blank
  // Prefer reactive subscriptions; fall back to bounded polling if unavailable.
  if (window.__convex && window.__convex.ConvexClient) { initReactive(); return; }
  let settled = false;
  const onReady = () => {
    if (settled) return; settled = true;
    window.removeEventListener('convex-ready', onReady);
    if (window.__convex && window.__convex.ConvexClient) initReactive();
    else startFallbackPoll();
  };
  window.addEventListener('convex-ready', onReady);
  setTimeout(onReady, 4000); // safety: don't wait forever for the module
}

function initReactive() {
  try {
    convexClient = new window.__convex.ConvexClient(CONVEX_URL);
    const api = window.__convex.anyApi;
    const tok = state.sessionToken;
    for (const [mod, fn, key] of REALTIME_TABLES) {
      const ref = api[mod][fn];
      const unsub = convexClient.onUpdate(ref, { sessionToken: tok }, (rows) => {
        state[key] = rows || [];
        if (state.user) {
          const fresh = state.allUsers.find(u => u._id === state.user._id);
          if (fresh) state.user = fresh;
        }
        updateLiveView(true); // background push: nav-only, never clobbers the active page
      }, (err) => { handleSessionError(err); /* other errors (e.g. recruit unauthorized) are expected — keep state */ });
      convexSubs.push(unsub);
    }
  } catch (e) {
    console.warn('Reactive init failed; falling back to polling.', e);
    startFallbackPoll();
  }
}

function startFallbackPoll() {
  if (pollTimer) return;
  pollTimer = setInterval(() => refreshAll(true), 20000); // bounded: 20s, not 5s
}

function stopData() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  for (const unsub of convexSubs) { try { unsub(); } catch (e) {} }
  convexSubs = [];
  if (convexClient) { try { convexClient.close(); } catch (e) {} convexClient = null; }
}

function updateLiveView(silent=false) {
  if (silent) {
    // Skip all DOM updates if a modal is open and the user is typing inside it
    const modalOpen = document.getElementById('modal-overlay')?.classList.contains('open');
    const active = document.activeElement;
    const typingInModal = modalOpen && active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.isContentEditable);
    if (!typingInModal) renderNav();
    return;
  }
  if (currentPage==='items' && itemsView==='inventory') {
    const el=document.getElementById('items-content');
    if(el) el.innerHTML=renderInventoryList();
  }
  if (currentPage==='archive') {
    const openMonths=new Set([...document.querySelectorAll('details.log-month[open]')].map(d=>d.dataset.key));
    const el=document.getElementById('archive-table');
    if(el) el.innerHTML=renderArchiveTable(openMonths);
    const s=document.getElementById('archive-count'); if(s) s.textContent=archiveCountLabel();
  }
  if (currentPage==='admin') {
    const el=document.getElementById('admin-wrap');
    if(el) el.innerHTML=renderAdminContent();
  }
  if (currentPage==='tasks') {
    const el=document.getElementById('tasks-list'); if(el) el.innerHTML=renderTasksList();
    renderNav();
  }
  if (currentPage==='lottery') {
    const active = document.activeElement;
    const typing = active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA') && document.getElementById('page-wrap')?.contains(active);
    if (!typing) {
      const pw=document.getElementById('page-wrap');
      if(pw) pw.innerHTML=`<div class="page">${pageLottery()}</div>`;
      renderNav();
    }
  }
  if (currentPage==='overview') {
    const active = document.activeElement;
    const typing = active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA') && document.getElementById('page-wrap')?.contains(active);
    if(!typing) {
      const pw=document.getElementById('page-wrap');
      if(pw) pw.innerHTML=`<div class="page">${pageOverview()}</div>`;
    }
  }
  if (currentPage==='items' && itemsView==='logistics' && !logisticsDetailId) {
    const pw=document.getElementById('page-wrap');
    if(pw) pw.innerHTML=`<div class="page">${pageLogistics()}</div>`;
  }
  renderNav();
}

        <button class="btn btn-black" style="width:100%;justify-content:center;" onclick="saveSetup()">Connect</button>

          1. In the <code>material-tracker/</code> folder run:<br>
          <div class="code-block">npm install &amp;&amp; npx convex dev</div>
          2. Copy the <strong>CONVEX_URL</strong> shown in the terminal.<br>
          3. Paste it above and click Connect.
        </div>
      </div>
    </div>`;
  document.getElementById('setup-url').addEventListener('keydown', e=>{ if(e.key==='Enter') saveSetup(); });
}

async function saveSetup() {
  const url = document.getElementById('setup-url').value.trim().replace(/\/$/,'');
  if (!url.startsWith('https://')) { showErr('setup-err','URL must start with https://'); return; }
  try {
    document.getElementById('setup-err').style.display='none';
    await fetch(`${url}/api/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:'sessions:whoami',args:{token:''},format:'json'})});
    CONVEX_URL=url; localStorage.setItem('navytrack_url',url);
    showAuth();
  } catch(e) { showErr('setup-err','Could not connect. Check the URL.'); }
}

      <div style="font-size:var(--text-sm);color:var(--fg);margin-bottom:16px;">Enter your username. An admin will verify you and send a one-time reset code (e.g. via Discord).</div>
      <div class="field"><label class="lbl">Username</label><input id="fp-user" type="text" autocomplete="username" placeholder="username"></div>
      <div class="err-msg" id="fp-err"></div>

      <div style="margin-top:12px;font-size:var(--text-md);color:var(--fg);text-align:center;">

async function doRequestReset() {
  const username=(document.getElementById('fp-user')||{value:''}).value.trim();
  if(!username){showErr('fp-err','Enter your username');return;}
  try {
    await convexMutation('passwordResets:request',{username});
    authPrefillUser = username;
    toast('If that account exists, an admin has been notified. They will send you a reset code.', 5000);
    showAuth('reset');
  } catch(e){ notifyError(e); }
}

async function doCompleteReset() {
  const username=(document.getElementById('rp-user')||{value:''}).value.trim();
  const code=(document.getElementById('rp-code')||{value:''}).value.trim();
  const nw=(document.getElementById('rp-new')||{value:''}).value;
  const cf=(document.getElementById('rp-confirm')||{value:''}).value;
  if(!username||!code||!nw){showErr('rp-err','Fill in all fields');return;}
  if(nw.length<6){showErr('rp-err','New password must be at least 6 characters');return;}
  if(nw!==cf){showErr('rp-err','New passwords do not match');return;}
  try {
    await convexMutation('passwordResets:complete',{username,code,newPassword:nw});
    authPrefillUser='';
    toast('Password reset — you can sign in now.');
    showAuth('signin');
  } catch(e){
    const m=(e&&e.message)||'';
    const map = {
      RESET_CODE_WRONG:'Incorrect code',
      RESET_EXPIRED:'That code has expired — request a new one',
      RESET_TOO_MANY:'Too many attempts — request a new code',
      RESET_INVALID:'No active reset for that username — request one first',
      PASSWORD_TOO_SHORT:'New password must be at least 6 characters',
    };
    const key = Object.keys(map).find(k=>m.includes(k));
    showErr('rp-err', key?map[key]:friendlyError(e));
  }
}

async function doSignIn() {
  const username=(document.getElementById('si-user')||{value:''}).value.trim();
  const password=(document.getElementById('si-pass')||{value:''}).value;
  if(!username||!password){showErr('si-err','Fill in all fields');return;}
  try {
    const res=await convexMutation('users:authenticate',{username,password});
    if(!res){showErr('si-err','Invalid username or password');return;}
    state.user=res; state.sessionToken=res.token;
    localStorage.setItem('navytrack_token',res.token); showApp();
  } catch(e){showErr('si-err',e.message);}
}

async function doSignUp() {
  const username=(document.getElementById('su-user')||{value:''}).value.trim();
  const password=(document.getElementById('su-pass')||{value:''}).value;
  if(!username||!password){showErr('su-err','Fill in all fields');return;}
  if(password.length<6){showErr('su-err','Password must be at least 6 characters');return;}
  try {
    const res=await convexMutation('users:signUp',{username,password});
    state.user=res; state.sessionToken=res.token;
    localStorage.setItem('navytrack_token',res.token); showApp();
  } catch(e){
    const msg = e.message.includes('USERNAME_TAKEN') ? 'Username already taken'
      : e.message.includes('USERNAME_INVALID') ? 'Username must be 2–32 chars: letters, numbers, space, _ . -'
      : e.message.includes('PASSWORD_TOO_SHORT') ? 'Password must be at least 6 characters'
      : e.message;
    showErr('su-err',msg);
  }
}

async function doLogout() {
  stopData();
  if(state.sessionToken) {
    try { await convexMutation('sessions:remove',{token:state.sessionToken}); } catch(e){}
  }
  state.user=null; state.sessionToken=null;
  localStorage.removeItem('navytrack_token'); showAuth();
}

function roleTagHtml(role) {
  const labels={'recruit':'Recruit','member':'Member','core':'Core','command':'Command','admin':'Admin','removed':'Removed'};
  const cls={'recruit':' recruit','member':' member','core':' core','command':' command','admin':' admin','removed':' removed'};

function isAdmin(u)   { return u && (u.roles||[]).includes('admin'); }
function isCommand(u) { return u && (u.roles||[]).includes('command'); }
function canManageLottery(u) { return isAdmin(u) || isCommand(u); }
function canCreateTask(u)    { return u && (u.roles||[]).some(r=>['admin','command'].includes(r)); }
function canHandOut(u)       { return u && (u.roles||[]).some(r=>['admin','command','core'].includes(r)); }
function canEditAnyItem(u)   { return u && (u.roles||[]).some(r=>['admin','command'].includes(r)); }
function canEditOwnItem(u)   { return u && (u.roles||[]).some(r=>['admin','command','core','member'].includes(r)); }
function canEditItem(u,item) { return canEditAnyItem(u) || (canEditOwnItem(u) && item.addedBy===u._id); }
function hasAdmin() {
  // If user list hasn't loaded yet, assume admin exists to prevent flash of Claim Admin button
  if (!state.allUsers.length) return true;
  return state.allUsers.some(u=>(u.roles||[]).includes('admin'));

function isRecruit(u) { return u && (u.roles||[]).length===1 && (u.roles||[]).includes('recruit'); }

function canDeleteLogistics(u)      { return u.roles.some(r=>['admin','command'].includes(r)); }
function canEditLogistics(u, task)  { return task.status==='open' && (u.roles.some(r=>['admin','command'].includes(r)) || task.createdBy===u._id); }

function pageLogistics() {
  if(logisticsDetailId) return pageLogisticsDetail(logisticsDetailId);
  const u = state.user;
  const canDo = u.roles.some(r=>['admin','command','core','member'].includes(r));
  const open   = state.logistics.filter(l=>l.status==='open');
  const closed = state.logistics.filter(l=>l.status==='completed');
  return `
    <div class="page-head">
      <div class="page-head-left">
        <div class="page-title">Logistics</div>
        <div class="page-sub">${open.length} open &middot; ${closed.length} completed</div>
      </div>
      ${canDo?`<button class="btn btn-black" onclick="openNewLogisticsModal()">+ New Task</button>`:''}
    </div>
    ${!open.length&&!closed.length?`<div class="empty" style="margin-top:48px;">No logistics tasks yet.</div>`:''}
    ${open.length?`
      <div style="margin-top:32px;">
        <div style="font-size:var(--text-xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg);margin-bottom:12px;">Open</div>
        ${open.map(t=>renderLogisticsRow(t,u)).join('')}
      </div>`:''}
    ${closed.length?`
      <div style="margin-top:32px;">
        <div style="font-size:var(--text-xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg);margin-bottom:12px;">Completed</div>
        ${closed.map(t=>renderLogisticsRow(t,u)).join('')}

}

function renderLogisticsRow(t, u) {
  const statusDot = t.status==='open'
    ? `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#22c55e;margin-right:8px;"></span>`
    : `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#94a3b8;margin-right:8px;"></span>`;
  const actions = `<div style="display:flex;gap:6px;align-items:center;" onclick="event.stopPropagation()">
    ${canEditLogistics(u,t)?`<button class="btn-ghost btn-sm" onclick="openEditLogisticsModal('${esc(t._id)}')">Edit</button>`:''}
    ${canDeleteLogistics(u)?`<button class="btn-del" onclick="deleteLogisticsTask('${esc(t._id)}')" aria-label="Delete task">&times;</button>`:''}
  </div>`;
  return `<div onclick="logisticsDetailId='${esc(t._id)}';renderPage();" style="padding:14px 18px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:background .1s;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:var(--text-md);font-weight:700;">${statusDot}${esc(t.items.length)} item${t.items.length!==1?'s':''} &rarr; ${esc(t.destinationLocation)}${t.destinationSystem?` <span style="font-weight:400;font-size:var(--text-sm);color:var(--fg);">(${esc(t.destinationSystem)})</span>`:''}</div>
      ${actions}
    </div>
    <div style="font-size:var(--text-sm);color:var(--fg);margin-top:4px;">Created by ${esc(t.createdByName)} &middot; Stored by ${esc(t.storedBy)}${t.completedByName?` &middot; Completed by ${esc(t.completedByName)}`:''}</div>
  </div>`;
}

async function confirmCreateLogisticsTask() {
  const inventory = state.navItems.filter(i=>i.status==='available');
  const itemIds = [];
  inventory.forEach((item,i)=>{
    const cb=document.getElementById(`log-item-${i}`);
    if(cb&&cb.checked) itemIds.push(item._id);
  });
  if(!itemIds.length){ toast('Select at least one item'); return; }
  const destinationSystem=(document.getElementById('log-sys')||{value:''}).value||undefined;
  const destinationLocation=(document.getElementById('log-loc')||{value:''}).value;
  if(!destinationLocation){ toast('Select a destination location'); return; }
  const storedBy=memberPickerValue('log-storedby')||state.user.username;
  try {
    await convexMutation('logistics:create',{sessionToken:state.sessionToken,destinationSystem,destinationLocation,storedBy,itemIds});
    closeModal(); toast('Logistics task created');
    await refreshAll(); renderPage();
  } catch(e){ notifyError(e); }
}

function openEditLogisticsModal(logisticsId) {
  const t = state.logistics.find(l=>l._id===logisticsId);
  if(!t) return;
  const inventory = state.navItems.filter(i=>i.status==='available');
  const currentIds = new Set(t.items.map(i=>i.itemId));
  // Items in the task that are no longer in inventory still need to be shown as checked
  const taskItemsNotInInventory = t.items.filter(ti=>!inventory.find(i=>i._id===ti.itemId));
  const allRows = [
    ...inventory.map((item,idx)=>({item, idx, inTask: currentIds.has(item._id), fromTask: false})),
    ...taskItemsNotInInventory.map((ti,idx)=>({
      item:{_id:ti.itemId, name:ti.name, category:ti.category, location:ti.fromLocation, system:ti.fromSystem, status:'available'},
      idx: inventory.length+idx, inTask:true, fromTask:true
    })),
  ];
  // Pre-select destination system
  const initLocs = SYSTEMS[t.destinationSystem] ? SYSTEMS[t.destinationSystem].map(l=>`<option value="${esc(l)}"${l===t.destinationLocation?' selected':''}>${esc(l)}</option>`).join('') : `<option value="${esc(t.destinationLocation)}" selected>${esc(t.destinationLocation)}</option>`;
  showModal(`
    <div class="modal-title">Edit Task</div>
    <div class="field"><label class="lbl">Items to move</label>
      <div style="max-height:220px;overflow-y:auto;border:1px solid var(--border);padding:4px 0;">
        ${allRows.map(({item,idx,inTask,fromTask})=>`
          <div style="display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border);">
            <input type="checkbox" id="elog-item-${idx}" value="${esc(item._id)}" ${inTask?'checked':''} style="width:18px;height:18px;flex-shrink:0;cursor:pointer;">
            <label for="elog-item-${idx}" style="flex:1;cursor:pointer;">
              <div style="font-size:var(--text-md);font-weight:700;">${esc(item.name)}${fromTask?` <span style="font-size:var(--text-xs);color:var(--fg);">(not in inventory)</span>`:''}</div>
              <div style="font-size:var(--text-xs);color:var(--fg);">${itemCatLabel(item.category)} &middot; ${esc(item.location||'—')}${item.system?` (${esc(item.system)})`:''}</div>
            </label>
          </div>`).join('')}
      </div>
    </div>
    <div class="grid2">
      <div class="field"><label class="lbl">Destination System</label>
        <select id="elog-sys" onchange="document.getElementById('elog-loc').innerHTML=locationOptions(this.value)">
          <option value="">—</option>
          ${Object.keys(SYSTEMS).map(s=>`<option value="${s}"${s===t.destinationSystem?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label class="lbl">Destination Location</label>
        <select id="elog-loc"><option value="${esc(t.destinationLocation)}" selected>${esc(t.destinationLocation)}</option>${initLocs}</select>
      </div>
    </div>
    <div class="field"><label class="lbl">Stored by</label>
      ${memberPickerHtml('elog-storedby', t.storedBy, 'member')}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-black" onclick="confirmEditLogisticsTask('${esc(logisticsId)}',${allRows.length})">Save</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function confirmEditLogisticsTask(logisticsId, rowCount) {

function renderInventoryList() {
  const u = state.user;
  const catCfg = itemCatCfg(itemsCatFilter);
  const hasSub  = catCfg && catCfg.sub.length > 0;
  const isComp  = itemsCatFilter === 'ship_component';
  let items = state.navItems.filter(i=>i.status==='available');
  if(itemsCatFilter!=='all') items=items.filter(i=>i.category===itemsCatFilter);
  if(hasSub && itemsSubcat!=='all') items=items.filter(i=>i.subcategory===itemsSubcat);
  if(isComp){
    if(invCompType!=='all') items=items.filter(i=>i.compType===invCompType);
    if(invCompSize!=='all') items=items.filter(i=>String(i.compSize)===invCompSize);
    if(invCompTier!=='all') items=items.filter(i=>i.compTier===invCompTier);
  }
  if(itemsSearch.trim()){const q=itemsSearch.trim().toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(q)||(i.description||'').toLowerCase().includes(q));}

  // Derive available filter values from unfiltered comp items (so empty options are hidden)
  const allComps = isComp ? state.navItems.filter(i=>i.status==='available'&&i.category==='ship_component') : [];
  const compTypes = isComp ? [...new Set(allComps.map(i=>i.compType).filter(Boolean))].sort() : [];
  const compSizes = isComp ? [...new Set(allComps.map(i=>i.compSize).filter(v=>v!=null))].sort((a,b)=>a-b) : [];
  const compTiers = isComp ? [...new Set(allComps.map(i=>i.compTier).filter(Boolean))].sort() : [];

  return `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;">
      <button class="btn-ghost btn-sm${itemsCatFilter==='all'?' active':''}" onclick="setItemsCat('all')">All</button>
      ${ITEM_CATEGORIES_CFG.map(c=>`<button class="btn-ghost btn-sm${itemsCatFilter===c.id?' active':''}" onclick="setItemsCat('${c.id}')">${c.label}</button>`).join('')}
      <div style="flex:1;"></div>
      <button class="btn-ghost btn-sm${itemsSearchActive?' active':''}" onclick="toggleItemsSearch()">${itemsSearchActive?'Close Search':'Search'}</button>
    </div>
    ${hasSub?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
      <button class="btn-ghost btn-sm${itemsSubcat==='all'?' active':''}" onclick="setItemsSubcat('all')">All</button>
      ${catCfg.sub.map(s=>`<button class="btn-ghost btn-sm${itemsSubcat===s.id?' active':''}" onclick="setItemsSubcat('${s.id}')">${s.label}</button>`).join('')}
    </div>`:''}
    ${isComp&&(compTypes.length||compSizes.length||compTiers.length)?`
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
      ${compTypes.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:var(--text-xs);font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg);margin-right:4px;">Type</span>
        <button class="btn-ghost btn-sm${invCompType==='all'?' active':''}" onclick="invCompType='all';document.getElementById('items-content').innerHTML=renderInventoryList();">All</button>
        ${compTypes.map(t=>`<button class="btn-ghost btn-sm${invCompType===t?' active':''}" onclick="invCompType='${t}';document.getElementById('items-content').innerHTML=renderInventoryList();">${COMP_TYPE_MAP[t]||t}</button>`).join('')}
      </div>`:''}
      ${compSizes.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:var(--text-xs);font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg);margin-right:4px;">Size</span>
        <button class="btn-ghost btn-sm${invCompSize==='all'?' active':''}" onclick="invCompSize='all';document.getElementById('items-content').innerHTML=renderInventoryList();">All</button>
        ${compSizes.map(s=>`<button class="btn-ghost btn-sm${invCompSize===String(s)?' active':''}" onclick="invCompSize='${s}';document.getElementById('items-content').innerHTML=renderInventoryList();">S${s}</button>`).join('')}
      </div>`:''}
      ${compTiers.length>1?`<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">

        <th onclick="invSortDir=(invSortCol==='${col}'&&invSortDir==='asc'?'desc':'asc');invSortCol='${col}';document.getElementById('items-content').innerHTML=renderInventoryList();"

        const sorted=[...items].sort((a,b)=>{

          if(av==null)return 1;
          if(bv==null)return -1;
          const cmp=typeof av==='number'?av-bv:String(av).localeCompare(String(bv));
          return invSortDir==='asc'?cmp:-cmp;
        });
        return sorted.map(i=>{
        const isWikelo = i.category==='wikelo';
        const compInfo = i.compType?`<div style="font-size:var(--text-sm);color:var(--fg);margin-top:2px;">${itemCompDesc(i)}</div>`:'';

          <td data-label="Item" style="font-weight:700;">${esc(i.name)}${i.description?`<div style="font-size:var(--text-sm);font-weight:400;color:var(--fg);">${esc(i.description)}</div>`:''}${compInfo}${subInfo}</td>
          <td data-label="Category"><span class="item-cat-tag">${itemCatLabel(i.category)}</span></td>
          <td data-label="Qty" style="font-weight:700;">${i.quantity}</td>
          <td data-label="Quality">${i.quality!=null?i.quality:'—'}</td>
          <td data-label="Location" style="font-size:var(--text-md);">${esc(i.location)}${i.system?` <span class="sys-badge">${esc(i.system)}</span>`:''}</td>
          <td data-label="Added By" style="color:var(--fg);">${esc(i.addedByName)}</td>

            ${showHandOut?`<button class="btn btn-outline btn-sm" style="margin-right:4px;" onclick="openHandOutModal('${esc(i._id)}')">Hand Out</button>`:''}
            ${isWikelo&&canEditAnyItem(u)?`<button class="btn btn-outline btn-sm" style="margin-right:4px;" onclick="openUsedModal('${esc(i._id)}')">Used</button>`:''}

function itemCompDesc(i){
  const tn = COMP_TYPE_MAP[i.compType]||i.compType||'';
  const gn = COMP_GRADE_MAP[i.compGrade]||i.compGrade||'';
  const s  = i.compSize!=null?`S${i.compSize}`:'';
  const t  = i.compTier||'';
  return [tn,gn,s,t].filter(Boolean).join(' · ');
}

// ── MEMBER PICKER (roster dropdown + "Other / external" free-text fallback) ────
// Keeps recipient/holder fields consistent so per-person inventory stays reliable.
function memberPickerHtml(idBase, currentValue = '', placeholder = 'member') {
  const members = [...new Set(state.allUsers.filter(u => !u.roles.includes('removed')).map(u => u.username))]
    .sort((a, b) => a.localeCompare(b));
  const isKnown = !!currentValue && members.includes(currentValue);
  const showOther = !!currentValue && !isKnown;
  return `
    <select id="${idBase}-sel" onchange="onMemberPickerChange('${idBase}')">
      <option value="">Select ${placeholder}…</option>
      ${members.map(m => `<option value="${esc(m)}"${m === currentValue ? ' selected' : ''}>${esc(m)}</option>`).join('')}
      <option value="__other__"${showOther ? ' selected' : ''}>Other / external…</option>
    </select>
    <input type="text" id="${idBase}-other" placeholder="Name…" value="${showOther ? esc(currentValue) : ''}"
      style="margin-top:6px;display:${showOther ? 'block' : 'none'};">`;
}
function onMemberPickerChange(idBase) {
  const sel = document.getElementById(idBase + '-sel');
  const other = document.getElementById(idBase + '-other');
  if (!sel || !other) return;
  if (sel.value === '__other__') { other.style.display = 'block'; other.focus(); }
  else { other.style.display = 'none'; }
}
function memberPickerValue(idBase) {
  const sel = document.getElementById(idBase + '-sel');
  const other = document.getElementById(idBase + '-other');
  if (!sel) return '';
  if (sel.value === '__other__') return (other && other.value.trim()) || '';
  return sel.value;
}

// ── HAND OUT MODAL ────────────────────────────────────────────────────────────
function openHandOutModal(itemId) {
  const item = state.navItems.find(i=>i._id===itemId);
  if(!item) return;
  showModal(`
    <div class="modal-title">Hand Out: ${esc(item.name)}</div>
    <div style="font-size:var(--text-md);color:var(--fg);margin-bottom:20px;">${itemCatLabel(item.category)} &middot; ${item.quantity} available</div>
    <div class="field"><label class="lbl">Hand out to</label>
      ${memberPickerHtml('ho-recipient', '', 'member')}
    </div>
    <div class="field"><label class="lbl">Quantity</label>
      <input type="number" id="ho-qty" value="${item.quantity}" min="1" max="${item.quantity}" step="1">
      <div style="font-size:var(--text-sm);color:var(--fg);margin-top:4px;">Max: ${item.quantity}</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-black" onclick="confirmHandOut('${esc(itemId)}',${item.quantity})">Hand Out</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function confirmHandOut(itemId, maxQty) {
  const recipient = memberPickerValue('ho-recipient');
  const qty = parseInt((document.getElementById('ho-qty')||{value:'1'}).value)||1;
  if(!recipient){toast('Select or enter a recipient');return;}
  if(qty<1||qty>maxQty){toast(`Quantity must be between 1 and ${maxQty}`);return;}
  try {
    await convexMutation('items:handOut',{sessionToken:state.sessionToken,itemId,handedOutTo:recipient,handedOutQty:qty});
    closeModal(); toast(`Handed out to ${recipient}`);
    await refreshAll(); renderPage();
  } catch(e){notifyError(e);}
}

// ── USED MODAL (Wikelo) ───────────────────────────────────────────────────────
function openUsedModal(itemId) {
  const item = state.navItems.find(i=>i._id===itemId);
  if(!item) return;
  const openProjects = state.tasks.filter(t=>t.status==='open');
  // Highlight projects that require this item
  const matchingProjects = openProjects.filter(t=>t.requiredItems?.some(r=>r.name===item.name&&r.category===item.category));
  const otherProjects = openProjects.filter(t=>!matchingProjects.includes(t));
  const projectOptions = [
    ...matchingProjects.map(t=>`<option value="${esc(t.title)}" style="font-weight:700;">★ ${esc(t.title)}</option>`),
    ...otherProjects.map(t=>`<option value="${esc(t.title)}">${esc(t.title)}</option>`),
  ].join('');
  showModal(`
    <div class="modal-title">Mark as Used: ${esc(item.name)}</div>
    ${openProjects.length ? `
    <div class="field"><label class="lbl">Use for project</label>
      <select id="used-project" onchange="document.getElementById('used-for').value=this.value" style="margin-bottom:4px;">
        <option value="">— select project or type below —</option>
        ${projectOptions}
      </select>
    </div>` : ''}
    <div class="field"><label class="lbl">${openProjects.length ? 'Or custom description' : 'Used for'}</label>
      <input type="text" id="used-for" placeholder="What it was used for…" autofocus>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-black" onclick="confirmUsed('${esc(itemId)}')">Confirm</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function confirmUsed(itemId) {
  const usedFor = (document.getElementById('used-for')||{value:''}).value.trim();
  if(!usedFor){toast('Enter what the item was used for');return;}
  try {
    await convexMutation('items:markUsed',{sessionToken:state.sessionToken,itemId,usedFor});
    closeModal(); toast('Marked as used');
    await refreshAll(); renderPage();
  } catch(e){notifyError(e);}
}

function renderAICompPicker() {

  const grades = [...new Set(COMPONENTS_CATALOG.map(c=>c.grade))];
  const sizes = [...new Set(COMPONENTS_CATALOG.map(c=>c.size))].sort((a,b)=>a-b);
  const tiers = ['A','B','C'];
  return `
    <div style="font-size:var(--text-md);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;color:var(--fg);">Select Component</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
      <select id="ai-comp-type" onchange="aiCompTypeFilter=this.value;aiCompGradeFilter='all';aiCompSizeFilter='all';aiCompTierFilter='all';refreshAICompPicker()" style="margin:0;">
        <option value="all">All Types</option>
        ${types.map(t=>`<option value="${t}"${aiCompTypeFilter===t?' selected':''}>${COMP_TYPE_MAP[t]||t}</option>`).join('')}
      </select>
      <select id="ai-comp-grade" onchange="aiCompGradeFilter=this.value;refreshAICompPicker()" style="margin:0;">
        <option value="all">All Classes</option>
        ${grades.map(g=>`<option value="${g}"${aiCompGradeFilter===g?' selected':''}>${COMP_GRADE_MAP[g]||g}</option>`).join('')}
      </select>
      <select id="ai-comp-size" onchange="aiCompSizeFilter=this.value;refreshAICompPicker()" style="margin:0;">
        <option value="all">All Sizes</option>
        ${sizes.map(s=>`<option value="${s}"${aiCompSizeFilter==s?' selected':''}>S${s}</option>`).join('')}
      </select>
      <select id="ai-comp-tier" onchange="aiCompTierFilter=this.value;refreshAICompPicker()" style="margin:0;">

      </select>

      oninput="aiCompSearch=this.value;refreshAICompPicker()" style="width:100%;margin-bottom:8px;">

function renderAICompResults() {
  let filtered = COMPONENTS_CATALOG;
  if(aiCompTypeFilter!=='all') filtered=filtered.filter(c=>c.type===aiCompTypeFilter);
  if(aiCompGradeFilter!=='all') filtered=filtered.filter(c=>c.grade===aiCompGradeFilter);
  if(aiCompSizeFilter!=='all') filtered=filtered.filter(c=>c.size===parseInt(aiCompSizeFilter));
  if(aiCompTierFilter!=='all') filtered=filtered.filter(c=>c.tier===aiCompTierFilter);
  if(aiCompSearch.trim()){const q=aiCompSearch.trim().toLowerCase();filtered=filtered.filter(c=>c.name.toLowerCase().includes(q));}
  return `
    ${aiSelectedComp?`<div style="padding:8px 12px;background:#f0f0f0;margin-bottom:10px;font-size:var(--text-md);font-weight:700;">
      Selected: ${esc(aiSelectedComp.name)} &middot; ${COMP_TYPE_MAP[aiSelectedComp.type]||aiSelectedComp.type} &middot; ${COMP_GRADE_MAP[aiSelectedComp.grade]||aiSelectedComp.grade} &middot; S${aiSelectedComp.size} &middot; Grade ${aiSelectedComp.tier}
    </div>`:''}
    <div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);margin-bottom:12px;">
      ${!filtered.length?`<div style="padding:12px;font-size:var(--text-md);color:var(--fg);">No components match.</div>`:`
      <table style="margin:0;">
        <tbody>${filtered.map(c=>`<tr style="cursor:pointer;${aiSelectedComp&&aiSelectedComp.name===c.name&&aiSelectedComp.type===c.type?'background:#e8e8e8;':''}" onclick="selectAIComp('${esc(c.name)}','${c.type}','${c.grade}',${c.size},'${c.tier}')">

          <td style="font-size:var(--text-sm);color:var(--fg);">${COMP_GRADE_MAP[c.grade]||c.grade}</td>
          <td style="font-size:var(--text-sm);">S${c.size}</td>
          <td style="font-size:var(--text-sm);font-weight:700;">Gr. ${c.tier}</td>

    </div>`;
}

function refreshAICompPicker(){
  const results=document.getElementById('ai-comp-results');
  if(results) { results.innerHTML=renderAICompResults(); return; }

  const wrap=document.getElementById('ai-comp-wrap');
  if(wrap){ wrap.innerHTML=renderAICompPicker(); document.getElementById('ai-comp-results').innerHTML=renderAICompResults(); }
}

function selectAIComp(name, type, grade, size, tier) {
  aiSelectedComp={name, type, grade, size:parseInt(size), tier};
  const nameEl=document.getElementById('ai-name');
  if(nameEl) nameEl.value=name;
  refreshAICompPicker();

function onAICatChange() {
  const cat=(document.getElementById('ai-cat')||{value:''}).value;
  const cfg=itemCatCfg(cat);

  const subcatWrap   = document.getElementById('ai-subcat-wrap');
  const armorWrap    = document.getElementById('ai-armor-presets');
  const compWrap     = document.getElementById('ai-comp-wrap');
  const wikeloWrap   = document.getElementById('ai-wikelo-wrap');
  const nameWrap     = document.getElementById('ai-name-wrap');
  const descWrap     = document.getElementById('ai-desc-wrap');
  const qtyWrap      = document.getElementById('ai-qty-wrap');
  const qtyField     = document.getElementById('ai-qty-field');
  const qualityWrap  = document.getElementById('ai-quality-wrap');

  // Reset armor presets
  if(armorWrap){ armorWrap.style.display='none'; armorWrap.innerHTML=''; }

  // Subcategory dropdown
  if(subcatWrap){
    if(cfg&&cfg.sub.length>0){
      subcatWrap.style.display='';
      const sel=document.getElementById('ai-subcat');
      if(sel) sel.innerHTML=`<option value="">Select subcategory…</option>`+cfg.sub.map(s=>`<option value="${s.id}">${s.label}</option>`).join('');
    } else {
      subcatWrap.style.display='none';
    }
  }

  // Ship component picker
  if(compWrap) compWrap.style.display=(cat==='ship_component'?'':'none');
  if(cat==='ship_component'){
    aiSelectedComp=null; aiCompTypeFilter='all'; aiCompGradeFilter='all'; aiCompSizeFilter='all'; aiCompTierFilter='all'; aiCompSearch='';
    if(compWrap){ compWrap.innerHTML=renderAICompPicker(); document.getElementById('ai-comp-results').innerHTML=renderAICompResults(); }
  }

  // Wikelo preset selector
  if(wikeloWrap) wikeloWrap.style.display=(cat==='wikelo'?'':'none');

  // Name field: shown for fps_weapon, ship_weapon, other, and wikelo-custom
  if(nameWrap) nameWrap.style.display=(cat==='fps_weapon'||cat==='ship_weapon'||cat==='other'?'':'none');

  // Description: wikelo and other
  if(descWrap) descWrap.style.display=(cat==='wikelo'||cat==='other'?'':'none');

  // Qty field: hidden for fps_armor (each preset has its own qty input)
  if(qtyField) qtyField.style.display=(cat==='fps_armor'?'none':'');
  if(qtyWrap) qtyWrap.style.display='';
  // Quality: not applicable for wikelo or other
  if(qualityWrap) qualityWrap.style.display=(cat==='wikelo'||cat==='other'?'none':'');
}

function onAISubcatChange() {
  const cat=(document.getElementById('ai-cat')||{value:''}).value;
  const subcat=(document.getElementById('ai-subcat')||{value:''}).value;
  if(cat!=='fps_armor') return;
  const wrap=document.getElementById('ai-armor-presets');
  if(!wrap) return;
  if(subcat && FPS_ARMOR_PRESETS[subcat]){
    wrap.style.display='';
    wrap.innerHTML=renderArmorPresets(subcat);
  } else {
    wrap.style.display='none';
    wrap.innerHTML='';
  }
}

function renderArmorPresets(subcat) {
  const items = FPS_ARMOR_PRESETS[subcat]||[];
  return `<div style="margin-bottom:4px;">`+items.map((name,i)=>`

async function confirmAddItem() {

  const location=(document.getElementById('ai-loc')||{value:''}).value||'Unknown';

  // ── FPS Armor: bulk-add checked presets ──

    const armorQualityRaw=(document.getElementById('ai-quality')||{value:''}).value;
    const armorQuality=armorQualityRaw?parseInt(armorQualityRaw):undefined;
    try{
      for(const item of toAdd){
        await convexMutation('items:create',{sessionToken:state.sessionToken,name:item.name,category,subcategory:subcat,quantity:item.qty,quality:armorQuality,location,system});

      closeModal(); toast(`${toAdd.length} item${toAdd.length>1?'s':''} added`);

    }catch(e){notifyError(e);}

  }

  let name,compType,compGrade,compSize,compTier;

  if(category==='ship_component'){
    if(!aiSelectedComp){toast('Select a component from the list');return;}
    name=aiSelectedComp.name; compType=aiSelectedComp.type; compGrade=aiSelectedComp.grade; compSize=aiSelectedComp.size; compTier=aiSelectedComp.tier;

    const preset=(document.getElementById('ai-wikelo-preset')||{value:''}).value;

  const subcategory=(document.getElementById('ai-subcat')||{value:''}).value||undefined;
  const description=(document.getElementById('ai-desc')||{value:''}).value.trim()||undefined;
  const quantity=parseInt((document.getElementById('ai-qty')||{value:'1'}).value)||1;
  const qualityRaw=(document.getElementById('ai-quality')||{value:''}).value;

function archiveCountLabel(){

function pageArchive(){

    </div>
    <div id="archive-table">${renderArchiveTable()}</div>`;
}

const LOTTERY_LOG_TYPES = new Set(['lottery_opened','lottery_drawn','lottery_pick']);

// Merge the reactive recent window with any on-demand older pages, deduped by _id.
function combinedArchive(){
  const seen = new Set();
  const all = [];
  for(const e of [...state.archive, ...archiveOlder]){
    if(seen.has(e._id)) continue;
    seen.add(e._id);
    all.push(e);
  }
  all.sort((a,b)=>b._creationTime-a._creationTime);
  return all;
}

function renderArchiveTable(openMonths){
  const entries = combinedArchive().filter(e => !LOTTERY_LOG_TYPES.has(e.type));
  if(!entries.length) return `<div class="empty">No actions logged yet.</div>`;

  const groups = {};
  const now = new Date();
  const currentKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  for(const e of entries){
    const d = new Date(e._creationTime);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!groups[key]){
      groups[key] = {
        label: d.toLocaleDateString('en-GB',{month:'long',year:'numeric'}),
        entries: []
      };
    }
    groups[key].entries.push(e);
  }

  const months = Object.keys(groups).sort().reverse().map(key=>{
    const {label,entries} = groups[key];
    // Open if: current month, OR was manually opened before re-poll
    const isOpen = key===currentKey || (openMonths&&openMonths.has(key));
    return `<details class="log-month"${isOpen?' open':''} data-key="${key}">
      <summary>
        <span class="log-month-arrow" aria-hidden="true"></span>
        <span class="log-month-name">${label}</span>
        <span class="log-month-count">${entries.length} entr${entries.length===1?'y':'ies'}</span>
      </summary>
      <div>${renderMonthRows(entries)}</div>
    </details>`;
  }).join('');

  // "Load older" appears while more history may exist (we've filled the recent window
  // and haven't yet hit the end of the table).
  const mayHaveMore = !archiveAllLoaded && (state.archive.length >= ARCHIVE_PAGE_SIZE);
  const loadMore = mayHaveMore
    ? `<div style="padding:24px 0;text-align:center;">
         <button class="btn btn-outline" onclick="loadOlderArchive()"${archiveLoading?' disabled':''}>
           ${archiveLoading?'Loading…':'Load older entries'}
         </button>
       </div>`
    : '';
  return months + loadMore;
}

async function loadOlderArchive(){
  if(archiveLoading || archiveAllLoaded) return;
  const current = combinedArchive();
  if(!current.length) return;
  const oldest = current[current.length-1]._creationTime;
  archiveLoading = true;
  const el=document.getElementById('archive-table');
  if(el){ const openMonths=new Set([...el.querySelectorAll('details.log-month[open]')].map(d=>d.dataset.key)); el.innerHTML=renderArchiveTable(openMonths); }
  try {
    const older = await convexQuery('archive:loadOlder', { sessionToken: state.sessionToken, before: oldest, limit: ARCHIVE_PAGE_SIZE });
    if(!older || older.length < ARCHIVE_PAGE_SIZE) archiveAllLoaded = true;
    if(older && older.length) archiveOlder = [...archiveOlder, ...older];
  } catch(e){ toast('Could not load older entries'); }
  archiveLoading = false;
  const el2=document.getElementById('archive-table');
  if(el2){ const openMonths=new Set([...el2.querySelectorAll('details.log-month[open]')].map(d=>d.dataset.key)); el2.innerHTML=renderArchiveTable(openMonths); }
}

    case 'item_used':               return `<strong>${esc(d.name)}</strong> &middot; ${esc(d.usedFor)}`;

    default: return JSON.stringify(d);

async function submitChangePassword(){
  const cur=(document.getElementById('cp-current')||{value:''}).value;
  const nw=(document.getElementById('cp-new')||{value:''}).value;
  const cf=(document.getElementById('cp-confirm')||{value:''}).value;

  if(nw.length<6){toast('New password must be at least 6 characters');return;}
  if(nw!==cf){toast('New passwords do not match');return;}
  try {
    await convexMutation('users:changePassword',{sessionToken:state.sessionToken,currentPassword:cur,newPassword:nw});
    toast('Password updated');
    ['cp-current','cp-new','cp-confirm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  } catch(e){
    const m=(e&&e.message)||'';
    if(m.includes('CURRENT_PASSWORD_WRONG')) toast('Current password is incorrect');
    else if(m.includes('PASSWORD_TOO_SHORT')) toast('New password must be at least 6 characters');
    else notifyError(e);
  }
}
